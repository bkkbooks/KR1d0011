body:
  text: 考工記解卷下宋林希逸撰玊人之事此一官所記與典瑞略同葢周禮自是一手追記周人之事考工記又是一手或先或後固不可知亦皆追述古制而已况其間亦有錯亂殘缺處所以與典瑞又稍異也鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之鎮圭天子所執守即執意也命圭者朝廷所命猶曰命服也有五等之命而後有五等之圭此不言蒲榖二璧者缺文也桓圭猶桓楹之狀也其左右稜道處為桓楹之形也信圭者純直勢也躬圭者稍彎曲也今文臣笏直武臣笏彎亦此意也三禮圖所載鎮圭刻一山桓圭刻植楹信圭刻一人直身躬圭刻一人曲身皆非古制又曰山以鎮安桓為柱石躬以保身榖為養人蒲為安人皆後人强生意義原其初意只是以此為五等之别艾軒曰今人帶夸上粟地文亦以養人乎御闕之類又何所取義乎天子執冒四寸以朝諸侯冒圭長四寸上方正而下稍斜剡刻之謂其可以冒諸侯之圭故曰冒葢諸侯之瑞圭上剡而此圭下剡故可以冒之此乃以上覆下之義未知古人果如此否竊意圭之為制皆出於王朝此下圭之下剡而諸侯之圭上剡二者必可以相合如今合同防偽造也未必以此為覆冒天下之義若作時文且依先儒之說諸侯來朝則王執此以受朝獻也天子用全上公用龍侯用瓚伯用將諸家以為此一節言祼噐也全者全用玉為之也其制以玉為龍形而置一杯於其中以盛酒也龍鼻也瓚其中也將其柄也記曰夏后氏用龍謂龍鼻也詩曰瑟彼玊瓚總言之也祼將于京執其柄也天子純用玉上公以玊為龍鼻諸侯以玊飾其中伯以玊飾其柄此尊卑之制也其説亦通但與上文不相屬􅋓然曰天子用全何以知其為祼噐哉鄭氏以龍當為厖瓚當為􅖸音贊漢時有膏􅖸食物也厖􅖸將皆玊之不純者天子則用全玊公侯則用不純之玊無他證據又輙易經字恐亦未安况將之為雜亦何所本乎艾軒曰祼玊有三為龍首一等玊也必次於全玉為瓚一等玊也又次於龍首瓚盛酒也為祼將又一等玊也又次於瓚祼將者酌酒所用也上文言圭此一節乃論為圭之玊謂天子之圭則用純全之美玊上公之圭則用為祼瓚龍之玊諸侯之圭則用為瓚之玊伯之圭則用為祼將之玊其文正在言圭之下此説極正而易通繼子男執皮帛上言圭之制既盡子男蒲榖璧當時必易知故記者不言之但論繼子男之下者矣子男不執圭而執璧璧為圓形與圭制異位居子男之下者則但執皮帛而已鄭注以此為公之孤非天子之孤與大國之孤者謂王之孤六命與卿同不當繼子男之後也然此説亦費力竊恐此句只是總言子男以上則用玊子男以下則執皮帛尚書五玊之下即曰三帛亦是等則如此易氏以為天子用全四句合在宗祝前馬之下公侯伯圭之下不言子男而曰繼子男之孤皆錯亂也亦似讀得未精瑩天子圭中必必者以組約玉圭之中欲執時不至失墜也鄭云俗呼約為鼈今閩人結索亦有此語其音如寛鼈也聘禮曰絢組亦約也鄭云如鹿車縪漢語也縪絢組皆一義也四圭尺有二寸以祀天四邸之圭也中央為璧之形圓也圭著其四面只一片玊為之也邸猶根柢之柢也即為璧形者是也四面之尖出者為圭形也尺有二寸想兩圭相去之長也注無明文亦未可曉大圭長三尺杼上終葵首天子服之王所搢者也亦名珽抒閷也其上兩畔殺去之故曰杼上也終葵椎也其首為椎又在杼上疏曰椎頭也齊人謂椎為終葵此記必齊人為之服之者用之也典瑞曰王搢大圭執鎮圭搢則在腰帶之間而又執鎮圭圭玊為之如何搢一而又執一亦非尊者所宜以意推之祭祀之時則執大圭上有椎頭不至失墜則可以搢故以搢言鎮圭則朝諸侯時所執故以執言决無一時並用兩圭之理土圭尺有五寸以致日以土地土圭夏至冬至測日之用也土地者土猶度也視日景之東西南北以度其地也大司徒所言建邦國者即此是也致日者以日至者視之其長短可以坐而致也書曰敬致即此致字祼圭尺有二寸有瓚以祀廟鄭云始獻酌奠也瓚如盤其柄用圭有流前注流口也前注者向神尸而注也宗廟有祼天地大神至尊不祼故曰以祀廟琬圭九寸而繅以象徳琬猶圜也王所使者之瑞節也諸侯有徳王有錫命使者執琬圭以致王命其長九寸亦有繅藉謹重之也象徳者以玊象徳故以此致命車服之類琰圭九寸判規以除慝以易行九寸之圭剡其一半其下必稍圜故曰判規判半也規圜也琬圭則上下皆為圓形琰圭則上一半剡下一半稍圜明與琬圭異制諸侯有為慝惡者王命使者執此以戒勅之使之除其慝而改易其行也後世則有詔書古者傳言以此為信必有善惡之別也璧羡度尺好三寸以為度羡延也度者制作之法度也其璧之制度不圜而延其長有一尺也鄭云其袤一尺而廣狹焉袤即延也謂其延可一尺而其廣則稍狹於袤也好孔也璧之中有孔也四面為肉中間為孔其孔之徑三寸也爾雅曰肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環瑗又眷反璧之好三寸則兩邊各有三寸為六寸是九寸也其形稍延則上下之羡處各半寸共為一尺其廣只九寸也度即量物之尺度也以此璧之尺寸可以起度亦猶律之可以起龠也圭璧五寸以祀日月星辰以璧為邸旁有一圭其長五寸祀天則四圭此祀則一圭也璧琮九寸諸侯以享天子琮之璧長九寸諸侯致享於王則以此為贄也小行人曰諸侯享天子用璧享后用琮此以璧琮並言則為二物矣言天子不言后者尊得以統卑也榖圭七寸天子以聘女圭上刻為榖之形其長七寸聘禮所用也大璋中璋九寸邊璋七寸射四寸厚寸黄金勺青金外朱中鼻寸衡四寸有繅天子以廵守宗祝以前馬三璋之勺形如圭瓚天子廵守有事于山川則用以為祼也大山川用大璋加文飾焉中山川則用中璋其文飾稍殺小山川則用邊璋半文飾其邊而已其祈闕宗祝執此在馬之前故曰宗祝以前馬璋次玊也為瓚之柄其勺以黄金為之而外用青金為飾故曰黄金勺青金外鑄金之齊以黄為下青為上則黄金不若青金青金乃金之精者也射四寸厚寸者其勺之前射出四寸之長但有一寸之厚也朱中者所盛之鬱鬯詩所謂黄流也流口為龍鼻之形其長一寸故曰鼻寸衡與横同勺口長一寸其横有四寸如今桃𤓰杯之形也有繅者文飾而藉之也巡守之時則有三璋之瓚在宗廟則用圭瓚也大璋亦如之諸侯以聘女諸侯聘女用大璋與三璋之大璋同名簡編錯亂誤寘於此文不相屬難以强通或曰當繼之天子以聘女之下瑑圭璋八寸璧琮八寸以頫聘圭璋璧琮四噐其長皆八寸璧琮不瑑而圭璋則瑑飾之瑑文飾之也衆來曰頫特來曰聘頫聘皆朝王也牙璋中璋七寸射二寸厚寸以起軍旅以治兵守射剡出也二璋皆長七寸射二寸是五寸以上即剡出也牙者其剡之側皆刻為鉏牙之文鄭云二璋皆有牙起軍旅出戰也治兵守守備也駔琮五寸宗后以為權琮方形中有孔以組繫之故曰駔琮宗后尊后也即王后也其重可以起五權之制亦璧羡起度之意大琮十有二寸射四寸厚寸是謂内鎮宗后守之大琮后所守猶王之鎮圭也謂之内鎮十有二寸取天數也天王天后以天為則也射四寸者琮之上剡出也下八寸正方上四寸則剡其厚有一寸也駔琮七寸鼻寸有半寸天子以為權駔琮與宗后同此則有一寸有半之鼻所以為别也琮上有鼻故可繫以為權宗后之琮不言鼻者互見之也兩圭五寸有邸以祀地以旅四望祀天者四圭祀地者兩圭此尊卑之别也旅􅀕名也四望之旅􅀕亦用之皆屬地也四圭託於璧兩圭必託於琮地取其方以琮為邸不言者可推而知也瑑琮八寸諸侯以享夫人上言九寸者以享天子此八寸以享天子之夫人禮之隆殺當然也案十有二寸􅀥㮚十有二列諸侯純九大夫純五夫人以勞諸侯案玊案也所以盛􅀥栗也􅀥栗十有二列則案必有十二枚每案皆長一尺二寸也此王朝盛禮所用也諸侯則九列大夫則五列純猶皆也凡諸侯大夫皆然也若夫人以勞答諸侯則用諸侯九列之禮也此乃奉上諸侯享夫人故言夫人所以答之而不及大夫也古者后與夫人皆有致飲於賔客之禮天子有三夫人璋邸射素功以祀山川以致稍餼半圭曰璋其上剡出者射也其身乃邸也素功者無瑑飾之工也功與工同山川之祀用之賔客在館致廩稍與餼也稍米也餼食物也楖人闕雕人闕磬氏為磬倨句一矩有半磬之制必先度一矩為句一矩為股而求其弦之兩頭相望一矩有半則磬之倨句也磬之制有大小此假矩以定倨句非用其度耳其博為一博謂股之博也股為二鼓為三參分其股博去一以為鼓博參分其鼔博以其一為之厚股磬之上大者鼔其下小者所當擊者也股大而鼔差小假如股三寸則鼓只二寸股九寸則鼔只六寸也又三分其鼓之博而厚得其一如鼔大三寸則厚只一寸也已上則摩其旁已下則摩其耑已上已下論厚薄也若鼔廣三寸厚有一寸以上則摩鑢其旁使薄也若鼔廣三寸而厚不及一寸則為已下是傷薄矣薄則不可得而使厚但摩鑢其石之端使短短則不薄矣此調其長短厚薄欲使其聲清濁得所也過厚則就大小增减過薄則就長短增减此作磬之法也矢人為矢此記所紀未知何時解者皆以周禮相辨證亦未為至當之論今且得依注疏所説鍭矢參分茀矢參分一在前二在後鍭矢茀矢兵矢田矢殺矢此記中五矢名也鄭氏以周禮司弓矢證之謂茀當為殺參分其矢之長以衡平之一分在前二分在後則得其半其所以如此者以鏃在笴首差重也此意葢欲鏃頭輕重得宜或太重太輕則於射時有病也以此推之則鏃箭之重正得笴之重三分之一也鍭矢茀矢皆然若以文法觀之恐鍭矢下三分字衍文也下文兵矢田矢則可見兵矢田矢五分二在前三在後此二矢以五分均之其鏃鐵比鍭矢殺矢又少輕也鄭云兵矢者枉矢絜矢也絜音擷又音結田矢繒矢也亦以司弓矢證之也殺矢七分三在前四在後此鐵鏃又差短小也鄭云殺當為茀音拂前以茀為殺此以殺為茀皆因周禮司弓矢職為窒礙也若知考工與周禮異則無此矣參分其長而殺其一笴之入鏃處必削减少許也故曰殺三分而殺其一亦欲輕重得所也五分其長而羽其一此論箭榦也假如笴長二尺則設羽處有四寸也以其笴厚為之羽深此言量其輻廣以為鑿深之意不曰量而曰以者分毫未可定也笴矢榦也其厚能幾况羽又設之四旁若謂其深必如其厚則無可容之處記者特言其大槩而已水之以辨其隂陽竹有上下上為陽下為隂以水試之浮者為上而沈者為下也夾其隂陽以設其比夾其比以設其羽比者笴之兩旁也陽為左隂為右比在其左右也比必笴上有一線稍髙也夾其比而設其羽者羽有四夾其比而置之四角皆有羽也參分其羽以設其刃則雖有疾風亦弗之能憚矣箭鏃之刃與笴末之羽兩者相並羽有三分則刃有一分鄭云刃二寸恐未然憚讀為怛又音歎雖有疾風亦不憚者言刃與羽若得其所則疾風之中而射之其箭亦無所動驚也刃長寸圍寸鋌十之重三垸鋌鏃之容笴處刃長一寸則其鏃之圍亦一寸鏃亦前小而後大其容笴處不應有十寸鄭氏以為脱字是已非十字誤則之字下更有某字也其重三垸則一矢之長通重十二垸矣何者前言三分一在前二在後則可見前弱則俛後弱則翔中弱則紆中强則揚俛者射之則趨下也翔者射之則摇摇紆者去不直也揚者激起也此言箭笴欲得不强不弱中與前後皆如一也羽豐則遲羽殺則趮豐多也殺少也遲去緩也趮去太急也此言設羽欲其不多不少得中也是故夾而摇之以眡其豐殺之節也夾於兩指之間而摇之則知其羽之豐殺也橈之以眡其鴻殺之稱也橈者以手試之也鴻大也殺小也此言欲其笴之大小停當也故曰稱凡相笴欲生而摶同摶欲重同重節欲疏同疏欲㮚生不用枯竹也摶圓也竹之圓既同則擇其重者用之竹之重既同則擇其節之疎者用之疎長也其節之長既同則擇其堅栗者用之相擇也此擇笴之法也陶人為甗實二鬴厚半寸脣寸甗其底虚如隔子然即甑類也可以蒸物也鬴六斗四升也其實二鬴則亦甚大矣其脣厚一寸其身厚半寸盆實二鬴厚半寸脣寸甑實二鬴厚半寸脣寸七穿盆有底者甑亦與甗同但其底不為隔子路而為七穿也鬲實五觳厚半寸脣寸觳與斛同三斗為觳則又大矣鬲鼎釡之類也庾實二觳厚半寸脣寸語曰與之庾則斗量之類也此與鬲甗同言則必以瓦為之但其名同耳庾又小於鬲者旊人為簋實一觳崇尺厚半寸脣寸簋祭祀之器也方曰簠貟曰簋易曰二簋可用享詩曰于豆于豋皆為祭器簋又從竹亦有木為之者今皆為摶埴之工則古人必皆以瓦為之豆實三而成觳崇尺三斗為觳三豆一觳則一豆之實一斗也凡陶旊之事髺墾薜暴不入市髺薄也墾有傷處也如鋤墾之傷物也薜破裂也暴有爆起處也古有市官凡此皆不中用者故不許其入市賣也噐中􅈩豆中縣􅈩音旋從注也鄭云讀如車輇之輇雜記中語也輇市専反陶者制噐之用也今人以木為之如盤然附泥而旋轉之凡陶噐之圓者皆然今曰噐中􅈩者言陶旊之為圓瓦噐皆中此法度也豆瘦而長故欲其直而中縣也􅈩崇四尺方四寸旋盤之髙四尺是已此圓物而謂之方四寸何也必其􅈩柄之直者也梓人為筍虡此一官制作易知其文最竒不可不熟讀之天下之大獸五脂者膏者臝者羽者鱗者宗廟之事脂者膏者以為牲臝者羽者鱗者以為筍虡羽禽也亦謂之獸總言之也欲言筍虡所刻之獸而並以為牲者言之文勢也以總入而後枚數之也脂者牛馬之屬膏者犬豕之屬臝者淺毛虎豹之屬故家語以人為臝蟲羽者飛禽也鱗者魚也外骨内骨郤行仄行連行紆行外骨龜屬内骨鼈屬郤行蚓屬仄行蟹屬連行蟻屬紆行蛇屬以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胷鳴者謂之小蟲之屬以為雕􅅣脰鳴鼃黽之屬注口也注鳴鳥之屬旁鳴蜩蟬之屬翼鳴蟋蟀之屬股鳴蚣蝑之屬胷鳴榮原之屬榮原此間所無未知何物此小蟲只可雕􅅣揚雄曰蛇醫或謂榮原厚脣弇口出目短耳大胷燿後大體短脰若是者謂之臝屬恒有力而不能走其聲大而宏有力而不能走則於任重宜大聲而宏則於鍾宜若是者以為鍾虡是故擊其所縣而由其虡鳴厚唇弇口豕之屬出目短耳目之突出曰出目注家皆不言何物大胷今馬亦然燿音耀燿後不知何物必其後可觀也恐是麟獅之類大體短脰身大而項肥也此為臝獸又有力而聲大故以為鍾虡鍾大噐也非有力者不足負之虡架也擊其所縣若其聲出於所刻臝屬之口故曰由其虡鳴此作文之竒者也銳喙决吻數目顅脰小體騫腹若是者謂之羽屬恒無力而輕其聲清揚而逺聞無力而輕則於任輕宜其聲清陽而逺聞於磬宜若是者以為磬虡故擊其所縣而由其虡鳴鋭尖也以吻决物而食之鳥雀皆然也數𦂳急也其目視急也鷹之屬也顅音慳又音肩長貎也莊子曰其脰肩肩是也故曰顅脰小體騫腹其身小而腹縮可以騫舉也此為禽屬無力而聲清陽陽者發也逺聞者彼此皆聞也磬小物故以此為虡小首而長摶身而鴻若是者謂之鱗屬以為筍頭小而長魚類皆然摶身而鴻身圓而大也鴻大也亦魚之屬此為鱗物故刻於鍾磬虡之筍上植者為虡横者為筍也凡攫閷援簭之類必深其爪出其目作其鱗之而深其爪出其目作其鱗之而則於眡必撥爾而怒苟撥爾而怒則於任重宜且其匪色必似鳴矣𤓰不深目不出鱗之而不作則必穨爾如委矣苟穨爾如委則加任焉則必如將廢措其匪色必似不鳴矣攫閷援簭四字總狀獸之能搏噬者攫以爪足攫物而食也閷者能殺物而食也援者以足握物而食也簭者以口噬物而食也梓人之雕刻此類其爪必深雕其目必突出鱗之而者頰之有髭鬣處也作起也刻之深􅋓而起則其視如怒撥者怒之狀也匪采色也詩曰有斐君子與此匪字同也雕刻之工精妙則纔施采色雖鍾磬未擊其物已似能鳴矣若工刻不精則無精神其狀穨如委墜言其不活也雖以鍾磬加之如將廢墜然言其不勝也縱施以采色亦似不能鳴者措施也自凡字以下皆結上文形容工匠之巧拙也古人文字其工如此不可謂不留意於文者誰謂三代無文人六經無文法乎古人制作皆有意義豈匠者能之主此官者皆有識之士也梓人為飲噐勺一升爵一升觚三升勺與爵受一升之酒觚字當作觶此鄭注之説葢韓詩説一升曰爵二升曰觚三升曰觶四升曰角五升曰散今此三升即觶也觶音至古書或作角旁從氏所以誤寫作觚也獻以爵而酬以觚一獻而三酬則一豆矣食一豆肉飲一豆酒中人之食也三酬九升獻一升則共為一斗矣此以噐量之大小而為文非主一獻而賔三酬也若曰一爵三觶為一斗則不文矣斗字聲訛為豆此亦鄭注之説也艾軒云既下文有一豆肉字則此即豆字非訛也能食一豆之肉飲一豆之酒則為中人矣旊人曰豆實三而成觳斛實三斗則一豆正一斗也依字讀亦可豆有三金木成之各實四斗此必瓦豆也旊人所為者瓦豆也論梓人所制而取瓦豆者以其大小所受言之即與斗同義也齊晏子所言乃金木豆也凡試梓飲噐郷衡而實不盡梓師罪之此數句乃結上文郷衡向人而横也爵觶之類當飲時既向人而側立則其中之實必無留者若有留而不盡者則是摩刮有不平處梓師必罪責其人梓師者梓人之長者也梓人為侯侯乃今之射垜也以木為之而張布也廣與崇方侯之髙與侯之廣雖有上下大小而其制皆方參分其廣而鵠居一焉鵠箭帖也三分其廣而置鵠在其中只得一分假如侯廣九尺則鵠三尺也不言尺寸者隨侯之大小以為凖則也上兩个與其身三下兩个半之鄭云个讀為幹幹乃上下舌也明堂左个右个即兩邊也看此兩个恐只是兩邊依字亦可通侯之制上廣而下狹自棲鵠而上以侯為三分身居中兩个居兩邊皆小大一同自鵠而下則其身與上身同而兩邊比其身只有一半葢下狹也注説頗費力以此言之似稍簡而易明皆不言尺寸者隨大小以此為準非可預定也上綱與下綱出舌尋縜寸焉綱繫縛處上下縛處必有舌兩邊之首皆出舌長一尋方可縛也尋八尺也縜音雲連侯之繩也繩圓有一寸定其大小也張皮侯而棲鵠則春以功此大射之侯也其皮用熊虎豹據司裘言之也春鄭以為蠢看來只是春時用也射禮以考功能也如擇士於射宫之類棲鵠則可射以考其中的與否也張五采之侯則逺國屬此賔射之侯也以五采畫之逺國服屬於王而來朝王以賔禮待之故用此侯古者以射為禮也此侯不棲鵠只畫於其中張獸侯則王以息燕此燕射之侯也王於休息燕享之時則張此獸侯亦不棲鵠而畫獸於其中郷射記所謂天子熊侯白質是也以白為質而畫熊於中鄭云凡畫皆用丹祭侯之禮以酒脯醢其辭曰惟若寧侯毋或若女不寧侯不屬於王所故抗而射女强飲强食詒汝曾孫諸侯百福侯乃射垜之名因其祭而寓意乃以為諸侯之戒葢射是武事所以及此意也古者處事以敬件件有祭禡有祭侯有􅀕是也如蜡祭猫虎之類亦然寧安也順理而安於職分者王則享之燕之不寧而為逆不順王命則伐之如射此侯也若者戒之之意謂其必似彼而不可似此也凡為寧侯則勉其加飲加食以自夀詒其國於汝曾孫世世為諸侯享有百福也酒脯醢之祭不用生物也鄭云寧侯為有功徳故祭之文意未通艾軒云古文天生地設如此簡妙後人為古文則務為艱險便有筆墨蹊徑不如此自然矣侯鵠侯中射處綴也於中央似鳥之栖曰棲鵠上下个布所以維持侯者个音幹亦曰上下舌綱所以繫侯於直者縜籠綱者植兩箱皆斜豎之三射大射用皮侯大射將祭也賔射用五正侯燕射用獸侯五采畫正正方之外如鵠内二尺五采者内朱而白次之蒼次之黄次之黑次之正九十弓侯五正七十弓三正五十弓二正天子以下皆五十歩侯無尊卑之别廬人為廬噐廬柄也此一官専為兵噐之柄戈柲六尺有六寸殳長尋有四尺車㦸常酋矛常有四尺夷矛三尋柲亦柄也五兵戈一也殳二也㦸三也酋矛四也夷矛五也疏曰此經所云柄之長短皆通刃而言尺數也酋之長與夷近矣車上之㦸長丈六尺倍尋曰常酋二丈夷矛二丈四尺夷長也酋短也夷字開口引聲言之故訓長酋字合口促聲言之故訓短先儒訓詁之法如此今人但依註讀不知其法始於此凡兵無過三其身過三其身弗能用也而無已又以害人凡兵之長至於三倍人身而止無過者不可過此也若過此則太長不可用矣過三其身已不可用若更加長而無已則非惟不可用又有害於人謂其太長能自累也故攻國之兵欲短守國之兵欲長攻國之人衆行地逺食飲飢且渉山林之阻是故兵欲短守國之人寡食飲飽行地不逺且不渉山林之阻是故兵欲長此一段言攻守之兵不同攻者逺行飲食不得飽則無力跋渉阻險則勞力故宜用短兵若在國守禦則飽佚而不勞宜用長兵短者輕長者重也短者弓矢之類長者殳戈之類也此亦言其大槩豈有攻兵全不用殳戈乎但有多寡耳凡兵句兵欲無彈刺兵欲無蜎句兵戈㦸之屬太長則執之而戰掉也彈者戰掉也刺兵矛之類欲無蜎蜎者撓也撓則弱易折也是故句兵椑刺兵摶椑不圓也齊人謂柯斧柄也椑者匾而不甚圓摶圓也刺兵之柄則甚圓也􅌛兵同强舉圍欲細細則校􅌛兵殳屬也以其不刺而擊故又曰􅌛兵也同强者柄之上下皆一樣大也舉者手執處也柄之執處其圍欲細細即小而光滑也欲其執之便也校疾也執之便則用之快疾也刺兵同强舉圍欲重重欲傅人傅人則密是故侵之刺兵柄之上下亦一樣强大但手執處欲稍重重則大於上下矣傅者附也執處重則上下稍輕用之附人兵既附人則可以審密而用之以刺人也密審也侵刺也凡為殳五分其長以其一為之被而圍之被註云把中者人把執處也假如其長五尺則其柄之執有一尺圍則徑三寸以上矣參分其圍去一以為晉圍晉者柄之下銅鐏也參分被之圍去一而得其二假如被一尺則銅鐏之圍有六寸六以上矣五分其晉圍去一以為首圍首殳上鐏也五分晉之圍去一而得其四假如晉圍五寸則首有四寸矣凡不言尺寸者皆隨其噐而凖之不可以預定也凡為酋矛參分其長二在前一在後而圍之五分其圍去一以為晉圍參分其晉圍去一以為刺圍二在前一在後者其柄之上二分稍大下一分稍小也刺圍者刺刃之圍也二前一後言其長也柄之大小則不可知假如圍有五寸去其一而得四則酋矛之下鐏其圍四寸也三分其下鐏之四寸而去其一則刺圍有二寸六分以上也凡試廬事置而摇之以眡其蜎也置植也植而摇之則知其蜎與不蜎也蜎橈弱也灸諸牆以眡其橈之均也灸拄也舉而拄之牆則知其彊弱均與不均也横而摇之以眡其勁也平執而摇之則知其勁與不勁處若有勁不勁處平而摇之則必一頭弱一頭强也六建既備車不反覆謂之國工六建即前言車之六等也六等之中有戈有殳有㦸有酋矛是四建也今總言六建者謂車上之六等既備而建立矣此四者之柄在車之上若無摇動反側傾覆則是其廬噐强弱得所此國工之所為也故曰謂之國工柲柄也椑齊人謂斧柄為椑薄兮反與鼙音同其形隋圜也隋他果反此注中字被把中也把音霸矜鄭云凡矜皆八觚矜巨巾反即柄也亦注中字晉柄下欲揷地而立之處有銅鐏曰晉與搢大圭之搢同音義搢亦揷也刺矛刃胷首殳上鐏鐏柄下入地處刺兵矛屬句兵戈㦸屬􅌛兵殳也殳長而無刃用以撃打也匠人建國建國者通王國侯國言之也水地以縣注云四角立木此説未明經言水地而注云立木恐亦未當葢水地以縣置􅈏以縣兩句即一事也先以水平地猶恐未定必以縣而後正也何以為縣置􅈏以為縣也水地者假如一所用一丈之地先為四方之溝乃注水以試之地有髙下則水之流行自有髙下鋤掘其地用水以平之水既平矣猶未可也又用縣􅈏以定之置􅈏以縣􅈏與臬字同臬居門之中此制用木一縱一横横者在地縱者向上其縱者横木之中就此木之上懸繩以取正即可定地髙下也水地以縣者謂以水平地而後為置􅈏之懸也眡以景此以土圭視日景而定東西南北也為規識日出之景與日入之景規法也為眡景之法以記日出入之景取東西之中也識音志記也晝參諸日中之景日出入之影用朝晚考之日中則定也夜考之極星以正朝夕極者北極星也其一至微號曰含樞紐正在天中極中也而天形如倚葢則此星乃在天之最北故曰北極夜考極星相去逺近則知南北之正也以正朝夕者南北既定則可以朝夕參日出入之景而正東西也匠人營國前言建國建國之城也此言營國營國之宫室也方九里鄭云九里者上公之國也九里之城孟子亦言之此必舉其一為例以推其餘也旁三門城之一旁皆為三門也四旁凡十二門也國中九經九緯每旁三門每門三涂則有九涂也南北門之涂為經東西門之涂為緯南有九經北有九經東有九緯西有九緯也四旁十二門共三十六涂也一門何取乎三路葢男左女右而車行其中也經涂九軌此舉一經以推其餘也且如南旁三門共九經之涂毎涂皆容一軌則為九軌也軌車行之路也車六尺六寸盡軸頭七寸共成八尺軌亦廣八尺方可容車行也男行左涂亦八尺女行右涂亦八尺左右非車行亦以軌言謂其軌廣皆可容車也軌亦曰轍左祖右社面朝後市面前也左右前後據王宫而言王宫居中而祖廟在左社在右朝廷在前市居在後也市朝一夫市與朝皆用一夫之地一夫方百歩以開方言則四面各百歩為百畝之地也一市百畝恐亦太狹易山齋曰古有三朝内朝治朝外朝亦有三市大市居中朝市居東夕市居西此特言其一耳夏后氏世室此三項皆明堂也注云世室宗廟也重屋路寢周人明堂則今之明堂也此說未然三代所名雖不同其實則一堯有衢室舜有總章亦眀堂堂脩二七廣四脩一脩者深也二七者堂脩十四歩也廣四脩一者四分脩之一也以十四歩分而為四每分三歩半也此堂之廣十七歩半是其廣加於深四分之一也五室三四歩四三尺五室者堂上為五室也三四歩四三尺此兩句最難說注說不通上既說堂脩十四歩廣四脩之一矣則此言三四歩者乃室之脩也四三尺者乃室之廣也只省文耳一歩六尺三个四歩是十二歩其室之脩如此四个三尺即二歩十二尺也二歩不成文故曰四三尺艾軒云古人未有文字蹊徑故出語自然如此簡妙今人既有文字蹊徑則於此但見其髙逺九階一堂四面皆有階南面三階東西北各兩階共為九也南面中階一也阼階在右一也側階在左一也側階亦曰西階阼階亦曰東階此據南向一面分為三則有中有東西非東郷西郷之階也四旁兩夾窻白盛室之四旁各有户一户皆兩夾窻夾者夾户之兩邊也每室四户八窻取其明快也白盛者以蜃灰堊壁也蜃海蛤也門堂三之二門堂者内兩塾兩邊兩臺也今天子正外門有兩臺如所謂兩塾之間也門堂者當為門側之堂也三之二者就十七歩之中得三之二也以十七歩三分之兩分為門堂也室三之一室者門堂側邊有兩室也於十七歩中得三之一也殷人重屋堂脩七尋堂崇三尺重屋亦明堂但名異耳其堂深五丈六尺乃七尋也脩深也其崇三尺陛髙三尺也四阿重屋注說四阿若今四柱四柱漢語四邊皆注水則四邊㵼水也疏云四霤今時佛殿皆為四柱中間屋髙四邊皆有簷也故曰重屋鄭云重屋複笮亦漢語複音福笮側白仄周人明堂度九尺之筵東西九筵南北七筵堂崇一筵周人謂之明堂也以九尺之筵而度其地東西七十二尺南北五十六歩筵者因其設筵以此量之也崇髙也度量也五室凡室二筵堂上有五室每室皆深二筵而已室就堂上四隅為之東南火西南金西北水東北木中央土以配五行若祭五帝於明堂則用此室周人為明堂既有五室夏后氏亦五室殷人必亦五室若非缺文則三代皆同只省文耳室中度以几堂上度以筵因其所憑之几而度之堂上設筵室中設几因其所有而用之以量也宫中度以尋宫中注云合院之内即屋内也即以手度之尋者用手尋度之兩臂之張即六尺也野度以歩涂度以軌野中人行涂中車行亦因其所常見而度之是度以歩也前曰經涂九軌是度以軌也廟門容大扄七个扄注云大扄牛鼎之扄長三尺小扄膷鼎之扄長二尺此以漢器證之扄用以閣鼎也每隻為一个此扄三尺則七个扄共長二丈一尺也廟門之廣可容此闈門容小扄參个廟中之門曰闈三个二尺則其門只廣六尺也路門不容乗車之五个路門大寢之門乗車廣六尺六寸五个乗車則共廣三丈三尺也曰不容者謂不及三丈三尺也應門二徹參个正門謂之應門乃朝門也鄭注云二徹之内八尺參个八尺則此門廣二丈四尺門外九經之涂男女行處與車行處共有三路此言二徹者借此為文不曰八尺三个而曰二徹三个者作文法也内有九室九嬪居之内路寢之内也九室九嬪各有所職此治事處也雖處六宫之内想王者聽朝時則九嬪在此室共職事也外有九室九卿朝焉路門外九室九卿治事於此也鄭云如今朝堂諸曹治事處以漢事證古制也三孤六卿共為九卿九分其國以為九分九卿治之鄭云分者分職非分地也艾軒云周召分陜為二伯矣周召三公也其間又分為九項以三孤六卿分主之亦各有地也王宫門阿之制五雉阿是門邊小樓鄭云角罘罳處也城上小樓為阿屋前曰四阿之類皆有簷霤處也雉髙一丈廣三丈鄭云度髙以髙度廣以廣此阿屋五雉是髙五丈長十五丈也宫隅之制七雉城隅之制九雉隅者城角也罘罳角處也角處又髙二丈故曰七雉城隅又髙四丈故曰九雉門阿可以論長若宫隅城隅則只論髙不論廣矣葢宫城甚長非七雉九雉而止也然度髙以髙度廣以廣鄭之說經無明文但恐度其髙而已左氏曰都城過百雉則是論其廣矣經涂九軌環涂七軌野涂五軌南北正涂為經涂環涂者環城外之涂也經則一直環則有圍繞處也野涂則野外之涂也環涂狹於經涂野涂又狹於城外之涂矣言經不言緯者經與緯同可以此推也門阿之制以為都城之制大都小都皆有城王之城隅九雉都城則只五雉而已分當殺也注説未明宫隅之制以為諸侯之城制王城九雉都城五雉諸侯之城過於都城而不及王城故有七雉隆殺之分也不直曰幾雉而以此為準者作文之法也環涂以為諸侯經涂王國經涂九軌諸侯則七軌如王國之環涂也野涂以為都經涂都在王畿之内公卿大夫之都鄙其涂制又殺於諸侯但如野外之涂五軌而已想小都亦然匠人為溝洫溝洫一事乃周禮大節目葢匠人之制與遂人不合故鄭氏以為遂人所言郷遂之制匠人所言乃三等采地之制王畿之内環以六郷又環以六遂其地窄故其所述至萬夫有川而止三等采地散在王畿之内地頗寛故匠人所言至方百里也然子細推算大有差殊處鄭氏之説難以牽合若知周禮自為一書考工自為一書本不相關皆非周公舊典則無復此拘礙矣耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂古人以牛乗車未知以牛耕只用人力而已故詩曰十千維耦耦者二人對耕也耜田噐也耜廣五寸二人各執耜而伐其地則有一尺矣伐者發也一耦之伐廣一尺深一尺則謂之畎􅍒與畎同古字巜巛皆不從田巜即為畎巛即為澮後人方􅄈田旁也畎乃田中小通水之圳也田頭之圳又大則倍於此畎其廣有二尺深有二尺則名曰遂矣九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仭謂之澮遂人曰凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路夫間有遂合於田首之遂可也九夫舉井田正數十夫舉其成則九夫之溝合於十夫之溝可也此言方十里為成成間有洫即九百夫之地而遂人曰百夫有洫何可强合乎此言方百里為同同間有澮即九萬夫之地而遂人曰千夫有澮何可强合乎説者又曰遂人井田之法乃成周開方之數匠人所言井間之溝為一里十倍之而為十里之洫又十倍之而為百里之澮特言其一面之長而已然匠人方十里之洫是每一面各十井以開方而論則方十里者為方一里者百是洫為百井乃九百夫之地何與於遂人百夫之洫匠人言百里之澮是每一面為百井以開方而論則方百里者為方十里者百是澮為萬井乃九萬夫之地何與於遂人千夫之澮彼據一間而言亦自竒特然終不可合大抵二書之不同艾軒所見髙矣若鄭氏郷遂異於采地之説前輩間字之説皆可為場屋之用若求其至當皆不然也洫大於溝澮大於洫而皆同歸於兩山間之大川遂人曰萬夫有川此經無之二書之異明矣文王司馬法曰通十為成成十為終終十為同說者曰文王治􅄮乃商末之制與匠人所言稍合書曰濬畎澮距川亦言自然之川恐此書乃為古法周禮出於一時所作將為經理天下之圖故立法大約如此亦與公侯伯子男分地同此皆其人一意規模也今人以六官考工皆出於周公宜其牽合窒礙也専逹於川各載其名凡天下之地勢兩山之間必有川焉大川之上必有涂焉川各有名則為大川可知矣水隨山行兩山之中必有川宜也大川之上可通人行安得無路此自然之涂非野涂九軌之涂也凡溝逆地阞謂之不行溝通名也澮洫畎遂皆可通名以為溝也此言造溝之法也地阞地脉也石有時而泐石裂亦隨脉理而裂則知阞為脉理也水行必順地脉若逆地脉則不行矣水屬不理孫謂之不行屬即注也理亦順之意水之所注若不順理亦不行矣逆脉則甚逆不順則微逆然皆謂之不行者畢竟水性纔不順則皆不去也梢溝三十里而廣倍梢字之義即前言梢其藪之梢也梢溝即開溝也水行三十里之逺則其末之廣必倍於首矣此亦言其大約耳凡行奠水磬折以參伍奠讀為停從注家也奠本訓定若如字讀亦可通定即停也積水不流者若欲行之不容一直而下一直而下則易涸也必為委蛇曲折之狀三折五折如石磬之形則其去有漸可為田間之用也欲為淵則句於矩淵深也欲為深溝停注此水則於其句曲如矩折之處開放深也凡溝必因水勢防必因地勢善溝者水漱之善防者水淫之水勢自髙而下為溝必順其勢不可逆也溝之善者水行如潄則易去也防以障水其善者則水雖淫溢亦不動也凡為防廣與崇方防以止水也此如今之斗門也其廣亦為方形其崇亦為方形方則固也今之斗門亦未有圓為之者其閷參分去一此言為防之法下闊三分則上闊二分殺減一分也今築牆者亦然大防外閷防之大者障大水也以外面觀之必厚其下基而殺減其上則水易脱去也凡溝防必一日先深之以為式此言為溝防之法若欲造溝先一日開深則用若干人工可闊若干尺也防之髙低亦可以深淺言故皆謂深式者凖也以此為凖式則可計工計地而成之也里為式然後可以𫝊衆力鄭云里字誤當為已艾軒云方里為井古人治井田溝防之事於一井之地先為之以為式一里之工既定則百夫千夫萬井之地皆可推矣故曰里為式葢以一里之工力為凖也傅附也有已定之工數則可以附集衆力而為之也靈臺曰民始附者為臺之工皆來附也即此附字之意凡任索約大汲其版謂之無任板築必以索而約束之斯干詩約之閣閣是也任使也凡為斗門者所用約束之索必須得宜若犬汲引其築防之版則受土不堅是其索不勝任也故曰無任大汲則版必橈也葺屋參分瓦屋四分葺屋茅葢屋也此言屋上㵼水之勢下簷去屋脊其斗峻之勢以三分為率假如屋深九尺則簷低於脊三尺若瓦屋則多一分以為峻也囷窌倉城逆牆六分逆却也四者之牆皆六分其髙而上閷其一謂下大而上稍小也囷圓為之窌入地窖藏也皆收禾榖之所亦倉類也城壁也凡屋壁皆是也以其築土為之故通謂之牆然窌在地中安得牆乎亦何以殺為葢窖藏雖掘地其上必有牆圍而後葢蔽之也堂涂十有二分爾雅曰堂涂謂之陳注曰若今令甓祴也令甓㼾甎也祴音階為堂之階以㼾甎甃之十分之中必欲二分稍髙則水㵼兩邊下也漢人名堂涂為令甓祴故鄭氏舉以為證今人堂前鋪砌為龜背狀者亦此意也竇其崇三尺竇今涵溝也宫中之竇必崇三尺者欲其通水多也牆厚三尺崇三之凡牆之厚若有三尺則其髙至九尺而止舉其大槩以為凖髙厚可以是推也車人之事半矩謂之宣宣人之頭也易巽為宣髮後人以宣字難解因為寡髮若論頭字亦如何解宣即頭也鄭曰頭髮皓落曰宣矩法也以人身為法人長八尺大節有三頭也腹也脛也以三分通率則矩二尺六寸三分寸之二也半矩者一尺三寸三分寸之一也此人頭之長也然鄭云身之大節三以頭為一節則合得一矩之長今乃半矩者葢頭之在身不應與腹脛等鄭且舉全身而言只是八尺作三截上截二尺六寸三分寸之二其一半則為頭也一宣有半謂之欘欘斲斤柄也以一宣尺三寸三分寸之一􅄈六寸二分寸之二則欘有二尺也一欘有半謂之柯伐木之柯柄長三尺欘為二尺􅄈一尺則為三尺也宣一尺三寸三分寸之二取半􅄈之一尺得五寸餘三寸每寸為三分得九分加前一分為十分取半得五分以三分為一寸共得六寸三分之一􅄈宣一尺三寸三分寸之二則為二尺一柯有半謂之磬折磬折者人立而俛其身也人長八尺俛其身則下截有四尺五寸也柯長三尺􅄈一尺五寸是為磬折四尺五寸也此注家之說皆因宣髮之宣起義又欲凑合下章柯長三尺之文故如此解恐亦未安竊意古人之矩自有一定尺寸不待明言而人知之故但就矩推説宣欘柯磬折之長短今既不知矩之長短乃因宣字而求之人身以八尺分三節亦無證據又安知一身不作四截分乎宣欘等名如曰賢曰軹皆如何解說若以文意推之畢竟此數句只是立尺寸之名以為制作之度半矩則為宣又自宣而上凡有三皆尺寸之度也不然則幾尺幾寸為矩古書有之而或脱漏也若如鄭說人身八尺俛其身為磬折安知不四尺乎安知不四尺三四寸乎何以定其為四尺五寸也車人為耒庛長尺有一寸耒耕噐也耒耜皆以木為之易曰斲木為耜揉木為耒直而有斜勢在土者曰耒耒下前接者曰耜耒微曲故曰揉耜乃合成故曰斲耜之前接則為耨以金刺土者也此曰庛鄭云音棘刺之刺其長尺有一寸此金為之者鄭云耒下歧者漢人下金有二也賈云古惟一歧今世亦然中直者三尺有三寸上句者二尺有二寸耒之制上句而下句上下皆微曲中間則直其直長三尺三寸也上句人所執處長二尺二寸下句則接耜也自其庛縁其外以至於首以弦其内六尺有六寸與歩相中也自耒下之耜縁其外而上至耒之首其勢如弓之弦葢上下微曲中間則直以繩張之如弦其内則如弓勢也其繩自首至下庛共六尺有六寸與人之歩相中六尺為歩此有六尺六寸則略相當也相中者大約可以相當也堅地欲直庛其金直則有力可以犁硬地也柔地欲句庛軟土則其金欲句曲則易翻去也直庛則利推利推者可以用力也句庛則利發利發者可以翻起田土也倨句磬折謂之中地倨直處也句曲處也磬折其弦勢處也中地者於地則宜也中如字今浙人謂不可用者為不中即此中字之義車人為車闕先言一柯之制而後及三車三車之闕尺寸自柯始説者曰柯斧柄也亦未必然且依注説宣欘柯磬折共有四名必如五量之名今無他證不可得而詳矣此柯長三尺所以前言半矩只得如此牽合以下及三尺之制也柯長三尺博三寸厚一寸有半五分其長以其一為之首其長三尺而闊三寸其厚一寸半此柄之全體也以三尺而五分之只得六寸其首六寸必斧金也造車必用斧因此而寓車之尺寸亦一説也轂長半柯其圍一柯有半此車人所造乃牛車栢車羊車與前言乗車兵車田車其制不同此轂之徑半柯者一尺五寸也長言徑也圍三徑一半柯之徑則有四尺五寸圍是其圍一柯有半也柯三尺半柯尺五寸共四尺五寸也輻長一柯有半其博三寸厚三之一輻長四尺五寸其博三寸而厚一寸三之一得博三之一也比乗車之輻為長乗車之輻六尺六寸此車之輻以上下言則其長九尺矣又有輪之壺中是九尺以上矣渠三柯者三渠注云即牙也車輮也即牙輪是也每柯三尺三柯九尺矣三个九尺則其牙輪之圍二丈七尺矣此以上言大車也行澤者欲短轂行山者欲長轂短轂則利長轂則安大車行平地及行澤柏車則行山此言二車之轂各不同也行澤間沮洳之地則其轂必略短轂短則壺中稍狹而無傾側之患也故曰利利者便也若山中險阻不平之地則其轂欲稍長長則壺中稍寛可以轉旋而無拘礙也故曰安安者無損動也行澤者反輮行山者仄輮反輮則易仄輮則完輮者牙也牙者所以為輪之固抱也此物乃揉木而為之木之裏則滑木之表近皮則澁澤地沮洳恐泥黏則反揉其裏為輪之外則滑而不黏泥也故曰易易者去泥易也山多砂石恐能損破之則因其表裏之常而轉側揉之以其表為輪之外則近皮處堅澁可以不損故曰完也完者全也全無損動也六分其輪崇以其一為之牙圍此大車之輪也輪崇九尺有餘以為六分則其牙圍有一尺五寸以上矣柏車轂長一柯其圍二柯其輻一柯其渠二柯者三柏車山行之車也轂長三尺其圍六尺長亦徑也若以圍三徑一言之則徑一柯其圍必三柯恐有誤字其輪一柯又短於大車之轂一尺五寸矣大車輻一柯有半即此一柯也渠牙也其二柯者三乃一丈八尺也二柯六尺三六則十八也五分其輪崇以其一為之牙圍兩輻相對六尺轂空壺中在外則輪崇六尺有餘注謂併壺中而為六尺以六尺為五分得一尺二寸是柏車之牙圍有一尺二寸也大車崇三柯此言輪崇也三柯九尺大車之輪崇九尺有餘而但以上下兩輻相對言則柯三九尺而已每輻皆長一柯有半兩輻相對則為三柯其轂之壺中豈無尺寸此可以意明之也記者言成數而已綆寸綆者牙輪上之箄也在輪之四面外其闊一寸則堅固也牝服二柯有參分柯之二牝服車箱也人立處也一柯三尺三分柯之二即二尺也有者又也二柯六尺又加二尺則為八尺是車箱之長八尺又云牝服較也較則在式之上亦謂之平鬲前圖已有之羊車二柯有參分柯之一不言何物二柯以其繼於牝服之下則所言必牝服也是羊車之車箱亦長七尺也柏車二柯亦以其繼於牝服之下則知亦言車箱而已柏車之車箱只長六尺又短於羊車此處文疑有脱誤且依注說艾軒云大車既言三柯而大車崇三柯數句又在於柏車之後其文斷斷續續自然竒古凡為轅乗車兵車田車則曰輈此三車則曰轅名異而制同三其輪崇參分其長二在前一在後以鑿其鉤三車之輪其崇各異隨其髙下而為之轅假如輪崇九尺則轅亦九尺以九尺之轅而三分之二分在前稍為鉤曲一分在後則入於車箱之下鉤者轅之鉤心也於二分之下一分之上就中而鑿之以鉤車箱也徹廣六尺徹軌也城門之軌即此徹也乗車之徹八尺此車只六尺者乗車六馬在前故徹廣此車牛在前故徹稍窄鬲長六尺鬲字注家以為轅之端壓牛領上者如此則為軛也其軛長六尺在於牛領之上必與乗車軛於馬者不同南人不識車只依注疏之言想像而已弓人為弓三十官之中自輪人而下除既闕之外獨此􅃓人為甚詳葢弓之用甚大古人以射御書數並言之不特兵家所用也故其言之詳如此取六材必以其時六材既聚巧者和之六材者幹角筋膠絲漆也六材既聚必有巧者然後能調適而用之故曰和幹也者以為逺也幹者弓之材也幹之才善則其射可逺角也者以為疾也角善則􅃓去速也筋也者以為深也筋束縛之則深固也非淺深之深膠也者以為和也和者欲得其宜也絲也者以為固也固欲其不壞也漆也者以為受霜露也受霜露則易壞故漆必欲其盡善也凡取幹之道七柘為上檍次之檿桑次之橘次之木𤓰次之荆次之竹為下柘桑柘之木也檍音益今人不知此木檿音掩檿桑註曰山桑也國語曰檿弧是也今人亦用桑木唐太宗論􅃓亦曰木心正其理邪者不可射此言竹為下則竹亦在可用之類但不如上六者爾恐此竹如今所謂柴竹之類凡相幹欲赤黑而陽聲赤黑則郷心陽聲則逺根赤黒之色則不嫩也郷心不近皮也陽聲則清近根則老其聲必不清叩之而清必不老也凡析榦射逺者用埶射深者用直埶者木之形勢有微曲者因其性而用之則其射去必逺木之埶直則其去有力射而中物必深析者分别之也分别其曲直而用之各有宜也居幹之道菑栗不迆則弓不發居處也處事曰處處幹即為幹之道也田一嵗曰菑初鋤掘之也栗音裂裂破裂也菑栗者剖削破裂之也迆邪也闕幹而紋理正直不邪迆則􅃓可久用而不發也發起也有起發則為損動也凡相角秋閷者厚春閷者薄閷殺也秋時殺牛則其角厚春時殺牛則其角薄秋氣斂揫角則堅實也穉牛之角直而澤牛尚少則其角滋澤而紋理直老牛之角紾而昔紾者絞纒去聲之紋也錯雜亂也牛老則其角有絞縛之狀而紋理錯亂也鄭云紾音如紾縛之紾漢方言也紾徒展反縳徒轉反此漢語今亦不可曉矣其意葢以角之文如絞縛而理麤其文錯然則不潤澤也韻書云紾轉繩也音診若依韻書讀尤易通疢疾險中險傷也疢久也牛有久病則角之中必傷動不可用也瘠牛之角無澤牛瘠則血少角不滋潤也角欲青白而豐末其色青白則角之善者也豐末者角之末豐大不尖小也以下節三者觀之凡善角其本必白其中必青其末必大也夫角之本蹙於􅑠而休於氣是故柔柔故欲其埶也白也者埶之徴也􅑠腦也牛頂之腦也蹙近也休音煦義同其角之下本近於腦而生氣煦之故其角柔和自然有曲埶埶者曲埶也其角也若白則自然有曲勢故曰徴言驗其色可知其勢也夫角之中恒當􅃓之畏畏也者必橈橈故欲其堅也青也者堅之徴也畏與隈同謂曲隈處也角之中央其用於􅃓也常在曲隈處隈處張時必橈動也若不堅則易折故欲其色青驗其色青則知其必堅固雖橈而不傷也夫角之末逺於􅑠而不休於氣是故脃脃故欲其柔也豐末也者柔之徴也角之末上去牛腦既逺生氣之煦所不及則多脃弱若其末尖小則脆而不柔不柔則易折其末既豐大則柔而不脆故可用也此以上言相角之法也角長二尺有五寸三色不失理謂之牛戴牛二尺有五寸則大牛之角也三色者本必白中必青末必豐不失其常理則此角之直可如一牛故曰牛戴牛言其所戴之角又有一牛之用也此一句下得竒古凡相膠欲朱色而昔昔也者深瑕而澤紾而摶廉朱色者惟牛膠火赤也昔文理交錯也瑕廉利也疏云廉瑕二者皆嚴利之狀也瑕廉雖深而潤澤則不燥也紾與縝同文理縝密而其角摶圓又亷利則角之善者也瑕與紾者皆因其文之交錯而言也前言紾而昔非角之善此字同而說又異只得依注解之鹿膠青白馬膠赤白牛膠火赤䑕膠黑魚膠餌犀膠黄六者之膠皆可用也犀海犀也鹿馬牛䑕犀皆以色别之惟魚曰餌者香餌之氣也以其腥氣異於諸膠也凡昵之類不能方闕同樴䐈皆音職注云皆黏之闕䐈黏即膠類也方比也除闕外其他凡黏昵之物皆不能闕他膠不可用也凡相筋欲小簡而長闕欲其小而脩長也疏云簡闕筋條亦有簡别闕大結而澤闕糾結以其潤澤也大而不可糾闕小簡而長大結而澤則其為獸必剽以為􅃓則豈異於其獸闕而澤則此獸之生也必剽闕則其用剽疾亦同此獸也此一句亦自竒特筋欲敝之敝闕欲其敝敗也敝之敝者謂其闕嚼嚙使敝而又敝則其筋軟闕文之竒者漆欲側闕􅔊測度而試之則知其清而無滓不清而無滓則不可測試絲欲沈絲沈水中之時其色精采據此乾燥亦如沈水之時則為善者得此六材之全然後可以為良自取幹起言六材至此而結之焉謂逐件試之六材既全美則可以為善也凡為􅃓上既言六材此下言治􅃓各以其時也冬析幹而春液角夏治筋冬時堅凝方可取幹於山林鋸析破削以為之也春氣融和則可漬液其角也夏氣熱則筋易柔故以治之秋合三材三材既備至秋方合而為之也寒奠體奠讀為定冬膠既堅其􅃓已成納之􅃓檠之中以定其往來之體不可移動也冰析灂灂漆也冰寒凝之時辨析其漆雖其乾稍遲而漆愈老則愈堅固也冬析幹則易此下又逐句發明也易者平易也冬植物性實則易光滑也春液角則合合猶洽也角潤之時漬液之則浹洽也夏治筋則不煩夏筋柔濕治之則不煩勞而易熟也秋合三材則合秋為􅃓則其三材相合而堅固也寒奠體則張不流􅃓既成而納之檠中天時方寒勁其體勢既定則張而用之必不流動也猶諺云無走作也冰析灂則審環漆其四邊可以回環而審定也春被弦則一年之事自冬析幹至寒奠體氷析灂之後次年之春弓闕之成整整一年事也析幹必倫闕亦順其倫理也析角無邪闕欲其端正也斲目必荼闕幹上之節目不可太急必舒徐闕處滑膩不隠物也斲目不荼則及其大脩也筋代之受病闕其節目必有不細滑處以筋束闕筋柔則其堅者必摩其柔者既闕弓而為之受病必有損也脩久也夫目也者必强强者在内而摩其筋夫筋之所由幨恒由此作闕明之凡幹有節目必堅强削闕以筋束之其堅者在筋之内闕摩動則必絶起矣筋之所以闕非常因目摩之而然也幨音闕之其筋絶起則如車之幨闕然此幨字亦必當時之語謂絶起為幨非記者以車幨比之而下此字也故角三液而幹再液幹與角皆用水漬液但幹止兩次而角必三次也厚其帤則木堅帤讀為襦注云􅃓禆也弓幹雖用全木必有禆助之者如衣有襦絮也其禆助者厚則其幹木愈堅薄其帤則需需愞懦也其禆助者薄則幹木易弱也視之亦不肥滿故注云不充滿也是故厚其液而節其帤厚多也其角之液必多其幹木之帤必節適得宜此一句結上文之意也約之不皆約疏數必侔一弓之中有纒縛處有不纒縳處雖約而不皆約也其約處必有疏數隨其宜而約之必使侔等也侔則無厚薄也斲摯必中斲削也摯致也致力而脩治也斲摯其幹必使得中也膠之必均弓之用膠必有均節也疏云自此以下皆言􅃓之隈裏施膠之事斲摯不中膠之不均則及其大脩也角代之受病大脩甚久若斲摯不得中用膠不均節則角常代一􅃓之材而先受害也夫懐膠於内而摩其角夫角之所由挫恒由此作膠在角内若有厚薄則角必為之摩動角被摩動則必挫折角之蹴折常因此而起也作起也凡居角長者以次需需音須角長二尺五寸為善則造弓之工必以次需而用之需求也注云長者當弓之隈短者居簫長短各稱其幹隈弓之隈曲處簫弓兩頭也恒角而短是謂逆橈引之則縱釋之則不校恒音縆竟也竟角而短者謂充滿弓之淵幹而不及兩端則橈其弓而勢必逆挽弓角短欲引此弓則其角縱而不受力施放而去則不能校疾釋施放而射之校音絞疾也恒角而逹譬如終紲非弓之利也竟其角而充滿淵幹之兩旁又達過於簫頭是角太長也角既過長則引發之時譬如此弓長在紲中放不去也紲弓䪐也詩云竹䪐緄縢是也乃藏弓之物也今夫茭解中有變焉故校茭音繳解音改茭解者弓隈與弓簫用角接處也變異也謂弓簫與臂用力異也異者人引之而臂中用力其放矢則簫用力二者之力異而同用則發去必絞疾也校音絞今夫者别起義端而發明角不可長之意於挺臂中有柎焉故剽挺直也直臂中乃弓之把處也柎者弓之把處兩畔有側骨側骨堅强則助弓為力故發矢則剽疾也側骨者把處兩邊貼以木也恒角而達引如終紲非弓之利茭解中之用力異挺中之有柎皆人用力處若角長過於簫則人用力而弓違之引放之則如終年在弓紲之上為所牽制而不可用此非弓之利也終紲非弓之利凡再言之也所以深發明此意也艾軒云如賢哉回也上下兩言之兼此一段言角短者只四句角長者却如此紬繹正作文之妙也注家看不出乃以引如終紲引字為誤合作譬字未盡古文法也撟幹欲孰於火而無贏孰與熟同贏音盈過多也撟矯也矯揉其幹雖欲火之至熟而又不可過熟於火撟角欲孰於火而無燂燂炙爛也矯揉其角亦欲熟又不可至於炙爛也引筋欲盡而無傷其力筋以縛束之牽引必盡者欲其𦂳也又不可至於傷損損則無力也䰞膠欲孰而水火相得烹煮其膠亦欲其熟水不可過多火不可過猛然則居旱亦不動居濕亦不動旱乾則燻雨濕則解音害幹角筋膠用火盡善如此則弓在燥濕皆不傷動也然則者如此也居者在也苟有賤工必因角幹之濕以為之柔因角幹之濕者謂其用火未熟也未熟則幹角外雖乾而内猶濕即矯揉而用之以此為柔而易揉也善者在外動者在内雖善於外必動於内雖善亦弗可以為良矣善在外謂其皮乾也動在内者裏未熟也外雖乾而易損動者在内雖弓成亦若盡善而用之必易敗故曰弗可以為良言非良弓也凡為弓方其峻而髙其柎峻者弓之簫頭也柎者弓之中手把處也簫頭必方手把處必髙長其畏而薄其敝畏者弓之曲隈處也必須稍長敝與蔽同手把處有物蔽之不可太厚故欲其薄宛之無已應宛者引而放之也峻方柎髙畏長敝薄則闕引而應其應無已謂其愈射愈好也謂其便利也下柎之弓末應將興此言不便利者弓之柎處若下而不髙則簫頭每引而起興者起也弓隈未應而簫頭先應則用之不便利也為柎而發必動於閷弓而羽閷末應將發此十六字又發明上八字也謂弓之簫頭為柎不髙而先發則於弓之接中處必有傷動閷者弓之接中也弓之接中若有傷動則必有緩弱之病接中既緩弱所以引之則簫頭常先應而發也閷音隆殺之殺羽音扈羽緩也末簫頭也上言將興此言將發發亦興也弓有六材焉六材已具上解維幹强之張如流水六材之中維幹堅强則弓之弛張也如流水然言其順瀏也維體防之引之中參弓之全體納之弓檠之中常為愛䕶則弓身完好引而張之則其弦五尺張之可得丈五故曰引之中參防愛䕶也引張也中參者一分之長張而有三倍也維角䟫之欲宛而無負弦䟫與撑同䟫正也宛引也角既正則引之與弦不相背故曰欲宛而無負弦也引之如環張引其弓則如環然即前中參之意釋之無失釋放也既張而放亦不失其常也體如環前言引之如環者張開時也此言體如環既弛之後弓之全體反轉如環也弓有六材此只言角與幹者以其受重者言之也故筋絲膠漆不及焉材美工巧為之時謂之參均其材既美其工又巧而為之又得其時三者皆善也故曰三均均者皆相若也為之時者冬幹夏角之類角不勝幹幹不勝筋謂之參均不勝者不能相過也角幹筋三者皆善亦曰三均量其力有三均均者三謂之九和量三材之力件件有三均則為九故曰三均者三此謂角之材美工巧為之得時幹亦材美工巧為之得時筋亦材美工巧為之得時也有此九者則為九和和亦均也工匠之人隨其材有巧拙或能於此而不能於彼必件件皆工則可故每件皆欲三均也九和之弓角與幹權筋三侔膠三鋝絲三邸漆三斞角與幹權者亦角不勝幹之意權亦均也此不言筋者承上文而足其意故不重出也侔等也鋝瑗也皆秤量之名邸與斞未知何義注曰未聞然以意推之亦皆言其輕重之則上工以有餘下工以不足工有巧拙故曰上下言工之巧者即此數物用之而有餘若拙工為之則六材雖具但見其不足葢用之不得宜也為天子之弓合九而成規為諸侯之弓合七而成規大夫之弓合五而成規士之弓合三而成規規圓也此言角弓既弛之時天子弓直合九弓而後成規合七者則稍曲矣合五者又曲矣至於合三則曲甚矣據此所言又與體如環之說稍異未知古制果如何也注云材良則句少如此則天子之弓雖既弛之時直而不句用之則自順葢其材柔和也天子諸侯大夫士分為四等特以弓之美惡而為次第耳弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之上制中制下制隨人身之長短非禮制也上士中士下士非命士也士有上中下者以其身材長短而言也凡為弓各因其君之躬志慮血氣志慮在心者血氣見諸舉動者制弓而隨人之身可也今欲隨其性之緩急而分之此古人之事其意未可曉今無此法豐肉而短寛緩以荼若是者為之危弓危弓為之安矢豐肉肥也肥而短者其性又寛緩舒遲故為危弓而用之危者急速也危弓而用安矢以濟之安者舒緩也骨直以立忿埶以奔若是者為之安弓安弓為之危矢骨立瘦也直者長之貎也忿埶忿怒而使威埶也奔者性急也瘦而性急則為舒緩之弓而用之安舒緩也弓既安則以危矢濟之危亦急速也弓有緩急可也而矢亦有緩急皆古法也今無之其人安其弓安其矢安則莫能以速中且不深此言人與弓矢俱舒緩則射之不急速其中物亦不深其人危其弓危其矢危則莫能以愿中此言人與弓矢俱急則射之其去雖速其不能以必中愿者誠慤也信也信則必之意也往體多來體寡謂之夾臾之屬利射侯與弋往者弛放時也來者張開時也夾㬰弓名也往體多者弛時直也來體寡者張時甚曲也此弓必勁故可射棲鵠之侯而弋鳥雀也往體寡來體多謂之王弓之屬利射革與質往體寡者弛時曲也來體多張時弦長也此弓性不勁只可射革與質而已前所謂熊皮白質之類也往體來體若一謂之唐弓之屬利射深張弛之時其鈎曲之體相似則是不勁不緩得中者其射之中必深故曰利射深大和無灂大和者前所為九和是也其體調適故不用漆也其次筋角皆有灂而深用筋角皆有漆而深者漆在背筋隈角之中而邊不漆也其次有灂而疏言背與隈皆有漆而間用之不皆漆也故曰疏其次角無灂角之在隈者不漆而他處皆漆也以上弓有四等此制作之精粗也合灂若背手文漆之合者謂弓表裏有漆處也其文皆如人之手背言用漆之善也角環灂弓之隈角處其漆文皆如環之周旋亦言漆之盡善也牛筋蕡灂弓用牛筋纒束則筋上之漆其紋如麻子蕡麻子也麻子殻上有細文麋筋斥蠖灂弓用麋筋則筋上之漆其文如斥蠖蠖者屈蟲也屈蟲身上有細縮紋易作尺斥與尺同和弓􅌛摩和弓調和其弓也􅌛者扣擊而試之也摩擦摩也此言造弓之時摩之試之欲其調和也前言聲清者逺筋擊試之類也覆之而角至謂之句弓注云覆察也句弓敝弓也角至角善也弓以角幹筋三者為之弓之敝者覆察之只角為善而幹與筋不善則只可為射革與質之用矣覆之而幹至謂之侯弓侯弓者前所謂夾㬰利射侯者此弓覆察之角既善幹又善是三者得其二矣此可用之弓也覆之而筋至謂之深弓深弓利射深者前所謂唐弓是也覆察之角善矣幹善矣而筋又善三者皆備則為良弓也至善也三至字訓善三覆字訓察此據注疏家所云但以意揣之恐亦未必為至當之說以侯弓為射侯與弋之弓以句弓為射革與質之弓亦是牽强凑合竊恐此三句乃言架弓之時前言寒奠體是弓方成時冬月且藏之以侯其定如今人焙中也此乃覆而架之如今敎塲中弓架也弓在架則目前可見故以所見之勢論之角乃弓之隈覆而在架角至於架則弓勢直是來體寡也此為句弓幹在簫之下角之上覆之而幹至於架則弓勢曲是往體多也此為侯弓筋者纒束處也在隈之上幹之下覆之而筋至於架則弓勢不曲不直是往來體均也此為深弓深弓可以射深侯弓可以射革質句弓則可以射侯與弋也不必以侯弓字為射侯與弋之侯則自為拘礙矣若為進士業只得依注家説此又求其至當之義庶覆至二字可通艾軒先生於末應將興數句亦有疑焉但曰他日遇良匠問之亦未敢以注為信也艾軒又云此書文字極好古人制作箋注亦多有不通處若論文字無有與考工記比者角在隈處隈上隈下隈左右隈畏與隈同在柎上下兩處弓之淵深處以左手横執其弓則上隈向右下隈向左柎手把也此弓兩邊抵手曰柎注曰側骨側骨角弓於把處兩畔有側骨骨堅强所以為弓亦曰柎峻弓末亦曰蕭蕭與峻同弓末也挺臂弓之直臂也敝所握手蔽之處閷音殺接中也亦曰茭解蕭與隈交接處曰茭解也帤弓幹雖用整木仍於幹上禆之故曰帤補弓物如布類紲竹䪐緄縢藏弓者别作一片竹向上札以助弓只短在弓隈間不滿兩頭句股法注云二尺為句以弓近為平平處二尺句也四尺為弦特長四尺為弦也以求其股是求者下直平疏云弦者四尺四四十六為丈六尺句者二尺二二如四為四尺以句除弦則丈六弦中除了四尺仍有一丈二尺在也然後以筭法約之將此丈二而方之取九尺來分作三截一三尺相禆排來共得方三尺也葢丈二尺亦廣一尺把三个長三尺廣一尺者來相禆則成方三尺也向來丈二只分了九尺則尚有三尺在將此三尺分作兩畔則各廣五寸而長三尺以此五寸禆前方三尺之兩邊每邊五寸則共有三尺半也但甬頭尚少方五寸故不整得三尺半只云幾半幾者近也此解注中幾半字如此則弓之股三尺幾半也弓爪直下平曰股軌前十尺而䇿半之疏中有一段句股法尤詳輈人看來句股法且如七尺之木而揉之深四尺七寸則七尺弦也四尺七寸句也粟米法方一尺闕尺六寸二分以縱横方截闕之考工記解卷下考工記解巻下釋音玊人信申冒一作瑁龍厖瓚贊必如字又音鼈杼柱祼灌易亦行去聲好去聲射石衡横瑑頫跳駔祖㮚栗勞去聲楖人楖櫛磬氏句勾耑端矢人鍭侯茀弗當作殺羽去聲下同笴槀下同比鼻憚怛又音歎又平聲鋌挺垸丸俛免趮躁橈閙稱去聲相去聲摶團陶人甗言又上聲一音彦鬴甫甑去聲鬲歴觳斛旊人旊音倣下同髺刮亦作跀薜擘暴剥􅈩船注音旋縣𤣥下同中去聲梓人虡巨脰豆注音晝又鬬鑄二音弇掩數促又音卹顅慳又音肩閷隆殺之殺􅗺筮穨魋一作頽廬人廬爐柲閉殳殊酋在由反已以句鈎彈音但蜎袁涓絃三音椑皮摶團􅌛計又音擊校絞傅附晉如字又音箭灸救匠人􅈏言入聲縣𤣥涂塗朝調重平聲度鐸乗去聲匠人為溝洫􅍒畎阞勒屬注孫巽梢蕭又如字奠亭閷隆殺之殺里讀為巳葺緝又音集窌敎車人欘柷車人為耒庛泚又音雌去聲中如字又去聲推如字又湯雷反車人為車輮揉又音柔牙訝綆方穎反牝歩忍反服負較角弓人檍益又音意檿掩相去聲郷向逺去聲射石菑側又如字栗音列如字迆以閷生殺之殺又色例反紾珍昔錯又音鵲􅑠腦休煦下同畏隈脃脆摶團訓字疑似據注家音訓如休畏斥昔荼等字猶可以偏旁聲類揣摩之至若羽荼宛數字誠可疑也菑栗上音兹下音烈迆音移閷音殺紾徒展反紾縳理麤昔作錯字讀險訓傷休作煦音畏作隈音亷瑕皆訓嚴利奠作定音荼作舒音帤作襦音去音女居反摰訓致恒作縆讀音更又訓竟校訓疾音絞茭司農音激又音骹撟尼兆反無訓詀宛訓引羽讀為扈訓緩斥音尺蠖之尺唐楊倞注荀子亦曰古今字殊齊魯言異或取偏旁相近聲類相通此即二鄭舊法也考工記解卷下釋音
