body:
  text: 考工記解禮類一周禮之屬提要臣等謹案考工記解二卷宋林希逸撰希逸字肅翁福清人端平二年進士景定間官司農少卿終中書舍人自漢河間獻王取考工記補周官于是經與記合為一書然後儒亦往往别釋之唐有杜牧注宋有陳祥道林亦之王炎諸家解今並不𫝊獨希逸此注僅存宋儒務攻漢儒故其書多與鄭康成注相剌謬然以綆三分寸之二為輪外兩邊有䕶牙者以較為車箱前横在式之上則不合於輪輿之制於倨句一矩有半解仍鄭氏注其圖乃以鼓為倨股為句則不合于磬折之度于戈之長内則折謂前為援與胡相並如磬之折於臯鼓之倨句磬折謂鼓為圓物何縁有倨句磬折之形恐有脱文皆于古器制度未之詳核特以經文古奥猝不易明希逸注明白淺顯初學易以尋求且諸工之事非圖不顯希逸以三禮圖之有闗于記者采摭附入亦頗便于省覽故讀周禮者至今猶𫝊其書焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d370e673dced76eab149231e565f25cee4817e83fa13474ce7110d274144c4db
