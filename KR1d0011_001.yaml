body:
  text: 考工記解卷上宋林希逸撰周禮六官其五官體制皆同而冬官以考工記補之又自一體似造物之意特亡彼而存此以成此經之妙也冬官司空掌百工之事舜命共工即此職也並之五官其屬亦六十此記只三十官名以考工者考試百工之事而記之也人生日用飲食百工所為必備闕一不可宫室舟車等制十三卦所象皆聖人所作也生民之初橧巢營窟而已聖人既處之以宫室衣毛之俗又易而衣裘百工之事自此愈多矣先王獨設一官以主之至周尤詳秦以來法度廢壊及宣帝緫覈名實至於百工伎巧咸精其能此亦為國急務也周官六典本有六篇當時所得只五篇故以考工記補之此記元無冬官二字乃漢人所增也但文字簡古必戰國以來先秦古書如小戴檀弓一篇公羊穀梁春秋傳亦先秦古書也蓋其文簡當且聱牙非漢文字之比漢人以金帛募書多有偽作如此等文字非後世鉛槧書生所及也考工記不特為周制也盡紀古百工之事故匠人以世室重屋明堂並言之三代制度皆在此也但書不全矣此書續出闕略不全不止韋氏裘氏段氏等官而已其先後次序亦自參錯不齊如攻木之工輪輿弓廬匠車梓若以序言當在上篇今梓廬匠車弓皆在下篇而其序亦自不同又畫繢二官而止曰畫繢之事玉人亦然意其全書凡曰之事者皆緫言之其列官自别即車人之事又有車人為某為某可知也况一官非止為一事如輪人梓人匠人車人皆一官之名而分主數事惜乎其不全見也國有六職百工與居一焉六職者坐而論道以下是也以百工與論道同說則知士農工商皆天地間要職無貴無賤若此記所論車蓋等象皆道也王公所論此亦其一也或坐而論道或作而行之以坐對作作起也尊者坐而論之以次則作而行之論事與任事自古便有分别但古者王公皆知道之士議論切實件件可行非後人空言比也或審曲面勢以飭五材以辨民器審曲者審其文理曲直也面勢者視其方圓曲直如弓人所言近心逺根之類皆須審察而用之唐太宗以弓矢定天下而不知弓材必弓工而後知其木心不正此豈易事哉五材即五行也鄭注以為金木皮土玉此說未然天地間何物不屬五行哉玉即石也其性則屬火與土矣即此亦格物窮理之事也辨訓具注說也若以為辨别而制作之於理亦通或通四方之珍異以資之此商旅事也漢初禁末作末作秦之所賤也秦人有市籍者及父祖有市籍者皆為人賤至高祖又禁服絲罽乘馬冠竹皮冠不知貿遷有無是生民不可闕之事賤商賈後世事也孟子所言龍斷之事所以可賤也或飭力以長地財飭力則無惰游之民田畆之間最爭人力人力所及田無髙下地財者財皆自地而生稼穡惟寳亦此財字之意或治絲麻以成之此婦功也自王公士大夫至於農工商無衣無褐不可也考工諸官不及織紝之事疑有闕也坐而論道謂之王公作而行之謂之士大夫審曲靣勢以飭五材以辨民器謂之百工通四方之珍異以資之謂之商旅飭力以長地財謂之農夫治絲麻以成之謂之婦功王公王之三公也王公猶曰帝臣也王朝三公曰王公此必三代時語鄭氏註以王為天子公為諸侯豈有天子而可列於國之六職乎作而行事是士大夫各宣力天地之間物物為人世之用一人之身百工所為備焉豈人人能自為之必皆是相資而成此吉凶大業所以立也生民日用相資一日不可闕所謂方以類聚物以羣分雖是紛紛不同而有至理行乎其間所論之道論此道也論道亦不止此然此等日用即道也粤無鎛燕無函秦無廬胡無弓車粤之無鎛也非無鎛也夫人而能為鎛也燕之無函也非無函也夫人而能為函也秦之無廬也非無廬也夫人而能為廬也胡之無弓車也非無弓車也夫人而能為弓車也鎛田器也函鎧甲也廬柄也弓車射獵用也車上有弓此言百工器械各隨土地所宜粤無翦鎛之人非無也蓋家家能之也燕近在北狄戎矢之具分外精絶秦多重山複嶺細木可以為廬者多匈奴在大漠之北居逐水草以射獵為生以車為家如漁人以舟為家也車上有此弓而人人能之也所謂無者言無人以此専門名家也智者創物巧者述之凡創物規模盡出於智者民木處則戰慄恂懼濕處則腰疾偏死穴居野處不可以為安聖人易以宫室為萬世之利凡人生日用之具衣服器皿皆出於前聖如神農種穀治藥燧人鑚火皆因以為號故曰百工之事聖人之作也千萬世而下皆隂受聖人之賜而不自知今日用事事如此全備若原其始豈易致哉述繼之也守之世謂之工百工之事皆聖人之作也語其官則謂之人論其世業則謂之氏韋氏裘氏必皆世其業者如漢倉氏庫氏亦世其官也爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人之所作也金與沙雜以水淘之而後以火爍之方可以為兵刃人之有兵刄猶虎豹之有爪牙也凝聚也合也合土以為器自陶唐氏始作舟作車皆天地間最大之用皆聖人為之首叙至此将言考工之事特出此四句文勢淺深有序此亦法也舟楫之事自十三卦已有之造舟為梁西周亦有之風詩詠舟者不一然則舟車之用皆大矣考工言車而不及舟人之事豈攻木之工尚有遺闕邪天有時地有氣材有美工有巧合此四者然後可以為良材美工巧然而不良則不時不得地氣也以下将言工匠之事先如此緫敘以起語天時隨物所宜也如冬伐木夏伐竹是也地氣所宜如瘦地宜粟陽坡種𤓰是也材之美如燕角荆幹之類是也工巧則在人材雖美而取之不以時則雖美而用之不逺又有材雖同而所出非其地則若美而非美雖有巧工亦不為良器此意蓋謂制作器用必得四者俱全如弓人所謂六材既具能者和之既緫言如此下文却以地氣數件證之而材美天時却結之於後前後錯綜文字自佳橘踰淮而北為枳鸜鵒不踰濟貉踰汶則死此地氣然也枳橘只是一種纔過淮則為枳北方最重橘柚實所無也鸜鵒不踰濟水過濟水則無之也魯史以來巢書之則記異也貉狐也若過汶即死則知草木禽獸各隨土地所宜鄭之刀宋之斤魯之削吳粤之劒遷乎其地而弗能為良地氣然也此皆爍金為刃之事鄭出良刀宋出良斤如運斤成風之斤也削書刀也古人未有紙筆以刀雕字謂之書刀亦如筆也吳粤之劔如干將莫邪萬世得名均此鐵也而工拙不同以水異也今建劒之水亦宜為刀如相州相纈只南中蘇木染之特水異耳燕之角荆之幹妢胡之笴吳粤之金錫此材之美者也燕地耐寒故出角角耐寒物也荆之幹幹弓弩之材也妢胡胡子之國也笴箭榦也吳粤出金錫皆材之美者凡物隨土地所宜也天有時以生有時以殺草木有時以生有時以死石有時以泐水有時以凝有時以澤此天時也草木有時以生有時以死非特春生秋殺也隨其種性榮枯各有時也石最堅亦有時而泐泐裂也水或為凝氷或為流澤時使然也此數行鋪叙天時地氣自有法度皆文法也凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五摶埴之工二前言皆序也此一凡字起端乃三十官之緫目也攻木之工輪輿弓廬匠車梓輪車輪也輿車軫也所以載人也弓弓人也廬柄也兵器之柄専命一人主之且古字不通於後世者何限廬字若非訓詁何以知為物柄哉匠營宫室之人也車一物也又有數人主之所以曰一車而數工聚焉梓氏為器用者今之小木匠也古人事事精至一人為一工斯無雜念所以垂弓和矢三代皆寳之輪扁斲輪如此入妙疾徐甘苦得手應心非専心致意何以得此兩都賦所謂工用髙曽規矩亦以世守之為精至也攻金之工築冶鳬㮚段桃築書刀也冶為戈㦸亦為箭鏃鳬為鐘㮚為量桃為劔段已失之必鍜鍊五金之工也攻皮之工函鮑韗韋裘函穿甲之工也鮑一作鞄音僕今消皮匠也韗為鼓穹者也韋氏已闕必為生皮者裘氏亦闕不知所主設色之工畫繢鍾筐㡛畫繢二官今記中只曰畫繢之事必有缺漏不全恐畫是為墨本者繢是用采色者鍾氏染羽筐氏已闕或是綉作之工㡛氏練絲漢武帝畫周公輔成王則畫工自古有之矣書曰作繪語曰繪事後素是綵色之工也刮摩之工玉楖雕矢磬玉琢玉人也楖人雕人已缺矢為箭之笴磬氏為石磬也摶埴之工陶旊陶旊皆窑匠也分作二官必有厚薄小大不同以上三十官而缺其六學記曰良工之子必學為箕良冶之子必學為裘箕亦竹為之學弓而先學箕此猶可通學冶而學裘殊無干渉艾軒曰冶氏為殺矢裘乃皮匠恐是學為射垜此説亦未穩然裘氏已失安知其所主何事雖曰攻皮之工如韗人為鼓穹是木匠也亦預攻皮之數冶氏又未必為矢匠古人言語不可强解冶氏裘氏想有干渉處其書已失亦難言矣有虞氏上陶下言車制謂其自周上輿所以制作愈備因上輿一語又自虞以來所尚言之文字之勢如此也註言舜至質雖已貴亦上陶器上者物物皆以陶為之也如甒瓦棺是也甒祭器也瓦棺之大者亦難造不知當時如何夏后氏上匠易橧巢為宫室其事已乆豈特夏上之必至夏后氏以來方精緻也殷人上梓飲食之器必至殷而後精周人上輿周人尚文采古雖有車至周而愈精故一器而工聚焉如陶器亦自古有之舜㣲時已陶漁矣必至虞時瓦器愈精好也故一器而工聚焉者車為多此一句又序言作車之事謂車一器也而數工方成有輪人輿人輈人等也車有六等之數車軫四尺謂之一等戈柲六尺有六寸既建而迆崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車㦸常崇於殳四尺謂之五等酋矛常有四尺崇於㦸四尺謂之六等車謂之六等之數六等之數言髙下有六等也自車軫四尺而始隨四尺増之以至六等車軫四尺軫者輿後横木也從地下至輿上髙四尺人長八尺登降以為節此一等也戈柲六尺有六寸柲著輿上本是六尺六寸既建而斜倚向後只有四尺軫本四尺兼戈柄四尺是八尺矣此二等也戈四尺人長八尺立在輿上是崇於戈四尺此三等也殳長尋有四尺人執殳立於車上如曰伯也執殳為王前驅八尺曰尋尋有四尺是丈二也人長八尺殳長丈二又崇於人四尺此四等也車㦸常倍尋曰常常丈六也又崇殳四尺是五等也酋矛長二丈㦸長丈六此矛長二丈則又崇於㦸四尺是六等也言六等之數却以人長八尺置其間蓋上下五者只一人之身可推其尺寸也古人律度量衡互相參攷亦此意也鄭𤣥云戈殳㦸矛皆揷車輢車輢車箱之旁也凡察車之道必自載於地者始也是故察車自輪始看此三句便見古文法本意只是察車必自輪始先發明一句曰必自載於地者始也又著是故二字多少曲折精神又發得意盡又好讀艾軒曰凡物皆從一處看起如看文章看寫字皆從何處看起此一車之制受重者輪故察車之工拙必自輪始也凡察車之道欲其樸屬而微至不樸屬無以為完乆也不微至無以為戚速也此句形容車輪極工樸屬者欲堅固而有所附屬謂其附於車如人生一臂也微至是着地處甚微眇也着地處若大便行不急如何得疾速戚即疾也三行之内兩箇凡察車之道他人則以為冗也此正古文好處不可不仔細看輪已崇則人不能登也輪已庳則於馬終古登阤也艾軒曰此等句語真謂之古文使韓退之見之安得不俯首閣筆人長八尺若輪太髙則登不得故只崇四尺若太卑則馬髙而輪低雖行平地亦如登坡阤然蓋輪低則負於馬如人負物馬則勞矣終古猶終年也此必古語若無終古二字則形容不出兩句兩輪字若以古文當省字則下句輪字可省蓋古文正要好讀有可省者有可省而不省者要自具眼故兵車之輪六尺有六寸田車之輪六尺有三寸乘車之輪六尺有六寸輪髙六尺六寸惟田獵之輪減三寸欲其便於馳逐也六尺有六寸之輪軹崇三尺有三寸也加軫與轐焉四尺也人長八尺登下以為節前説三項車輪兵車乘車尺寸本同亦可省而不省者到此又提起六尺有六寸之輪一句多少精神若以冗字論之則不勝其冗矣論古文正不如此前言車軫四尺為一等文勢未足又以此發明以足之也軫車箱後横木也軹轂表也乃轂空壼中轉軸末也轐乃安軸者也又名伏兔鄭註云今人謂之車屐是也輪人為輪艾軒曰東南人不用車不識體制如何且依經解註而已中間有三兩處大可疑亦只得依經解說其間算數則依本註車之重在輪故先言此官斬三材必以其時造車有三材轂輻牙是也斬此三材必須順時轂是輪内圓者牙乃外圈也輻乃輪中直者所謂三十輻共一轂則輻乃直指於轂者也凡木有所謂隂木者有所謂陽木者陽木則仲冬斬之隂木則仲夏斬之蓋五月一隂生所斬木即為隂木十一月一陽生所斬木即為陽木又有隨其所宜而不専以仲夏仲冬者三材既具巧者和之轂輻牙三者之材已具必須巧工方為之和者調適得宜也轂也者以為利轉也軸在轂中轂盡善則隨軸而轉利者活也順也輻也者以為直指也輻取其直以指上下上則轂下則牙也牙也者以為固抱也牙乃捲而為輪也此全才矯揉而為之太和之世山出器車蓋天生此才可見成為輪不待人力也固抱者如人抱之而堅固也輪敝三材不失職謂之完輪舉全體而言也輪雖敝故而所謂三材者皆不失其職則是件件精好也職任也任木之謂職完全也言其材全也望而眡其輪欲其幎爾而下迆也進而眡之欲其微至也無所取之取諸圜也此下說輻輪轂三者之制輪即牙輪也望者直望之望也回顧則謂之顧矣所謂車中不内顧顧者回視也一車兩輪謂之一兩如兩鞋為一兩所謂戎車三百兩者三百乘車也幎是帖幎之幎迆字據訓詁如東北迆㑹于海之迆又訓斜幎爾是欲得帖車而下斜也帖車而下迆則輪之斜勢在下可見也進而眡之是近而細視也㣲至者着地處微小也着至也著地多則不謂之微至無所取之取諸圜也者言只欲其圎也望其輻欲其揱爾而纎也進而眡之欲其肉稱也無所取之取諸易直也揱爾者殺之狀也纎者小也輻之直指下要壯上要殺減且謂之輻合當皆壯今又要殺減何也蓋一轂之上著三十穿若不揱殺何縁入得所以入轂者宜殺入牙者宜壮艾軒云東南人不識車只據紙上語且如此說進而眡之者廹而視之也肉稱是輻轂牙之才皆相稱也肉材也無所取之只取其平易端直而已望其轂欲其眼也進而眡之欲其幬之亷也無所取之取諸急也轂是輪内圜者轂别有一軸旋轉此謂之轂者只言其圜者也眼者突出也就牙輪側視轂須略見突出故謂之眼幬覆也謂以皮鞔在轂上也雖有皮鞔而木之亷隅皆見如木上生皮一同無所取之取其急也急者皮束得𦂳也稍寛則不可轉矣眡其綆欲其蚤之正也察其菑蚤不齵則輪雖敝不匡綆者牙輪之内所用也蚤與爪同就牙内而視爪之布置必正不咼斜也輻之入轂處為菑入牙處為爪上下入處皆不可不整也齵者參差不齊也輪雖敝不匡謂輪雖敝舊而此輻不乖斜也匡枉也凡斬轂之道必矩其隂陽陽也者稹理而堅隂也者䟽理而柔木性有隂陽非仲夏斬之即為隂仲冬斬之即為陽也矩法也隨木之隂陽自有法也陽木則文理縝宻而堅隂木則文理踈麄而柔故用火烘炙要木性均等也為轂既如此三材必皆然是故以火養其隂而齊諸其陽則轂雖敝不藃此一句甚工謂若用隂木必以火脅之使堅硬與陽木相齊則輪雖敝舊而所幬幔之皮皆不暴起也故曰不藃轂以全木為之牙亦以全木為之轂小而長則柞大而短則摰柞是傾柞之柞摯是杌􅑾之摰不得小而長不得大而短須要得中也是故六分其輪崇以其一為之牙圍參分其牙圍而漆其二輪崇六尺六寸牙圍一尺一寸三分牙圍而漆其二是下一分不漆履地處也履地處要行不用漆也椁其漆内而中詘之以為之轂長以其長為之圍以其圍之阞捎其藪椁字箋註家訓度艾軒云恐亦是口相傳如此說今且依之看來考工記須是齊人為之蓋言語似穀梁必先秦古書也輪有六尺六寸今度其漆内兩邊兩寸許含漆了只有六尺四寸就其中詘而為二則一邊得三尺二寸以此為轂長則轂長三尺二寸也伸而量則為長圓而量則為圍故曰以其長為之圍若圍長三尺則徑一尺也以其圍之阞捎其藪三分之一謂之阞三尺二寸為一圈是為轂之圍藪是衆輻所入之處有三十孔以三尺二寸之轂三分除一分以為三十孔也捎除也藪孔也捎其藪鑿其木而為孔也五分其轂之長去一以為賢去三以為軹轂長三尺二寸五分之去一分以為賢去三分以為軹賢是大穿軹是小穿鄭云去一字誤合為去二則大小相稱賢是内穿也軹是外穿也外穿若大又恐轂中横木突出故去一以為賢是内一孔大也去三以為軹是外一孔小也此内穿外穿鄭氏以為皆金也然亦未可曉恐是軸頭用金束之金之為束内穿大外穿小蓋軸頭則金稍厚也凡鐵皆曰金軸末亦名軹容轂必直轂直輪乃直故容轂不可不直容納也納輻於轂少不直則輪不平正矣陳必正所以約轂也詩曰約軧是上畫竒文故謂之陳陳不可不正者約之必平正也施膠必厚若施膠不厚則易得牽動施筋必數謂其束之多也數者不止一再束也幬必負榦既摩革色青白謂之轂之善幬者以皮鞔之也負榦者如木生皮也即前見亷之意既摩革青白謂之轂之善者言既鞔之矣因而摩之色青白不似皮色而其色青白則為精好參分其轂長二在外一在内以置其輻轂長三尺二寸三分其轂長者取其伸數而言之也藪為内藪之間為外藪所以入轂之菑也二在外者二分在外也一在内者一分在内也以三分之一置其輻是以藪孔言也其不見處曰内其間可見處曰外凡輻量其鑿深以為輻廣輻廣而鑿淺則是以大扤雖有良工莫之能固鑿深而輻小則是固有餘而强不足也故竑其輻廣以為之弱則雖有重任轂不折凡物有許大亦須有許深物之堅牢必大處與深處平若是輻廣而鑿淺則大小杌􅑾雖有良工亦不能使之堅固也鑿深而輻小則是堅固有餘而不勝其任故竑其輻廣以為弱則雖有重任轂不折也竑註家亦訓度字今亦依之度其輻廣看有幾何以為之弱弱即菑也今人謂蒲本在於水中者為弱弱即是本字之義帶牙處為爪帶轂處為菑菑是本處也度其輻廣以為之弱使廣與深相稱如此雖有重任而轂不折矣弱如字亦曰菑皆輻之入轂者也參分其輻之長而殺其一則雖有深泥亦弗之溓也輻乃入牙與轂者三分其長而末捎一分殺而小之則雖有深泥亦弗粘帶於輻也參分其股圍去一以為骹圍股圍則近轂也近轂處壯故謂之股圍亦如人之股也骹圍則近牙處也近牙處在下殺而小之亦如人脛近足者細於股謂之骹參分其股圍而去其一分以為骹圍即上所謂三分而殺其一也揉輻必齊一輪則有三十輻揉其木必使齊同無小無大也平沈必均謂以三十輻用水試之必須均平無復輕重也直以指牙牙得則無槷而固不得則有槷必足見也謂輻之材貴乎直其指於牙若與牙相得則雖無槷亦固若不與牙相得則雖有槷而入牙處必竟露也故謂之足足者近牙處也上文近轂處為股圍則此近牙處當為足也若入孔處不恰好則必用榝用榝則入孔處必有現露也槷者榝也近股則人不見近下足處則易見也六尺有六寸之輪綆參分寸之二謂之輪之固綆未知何物鄭云輪箄則車行不掉恐是輪外兩邊有一重䕶牙者故亦名箄此曰三分寸之二為輪之固牙加以綆則愈固也車人云大車綆寸此乘車綆必亦一寸也綆在牙輪外三分其一寸而以其二為輻爪之孔處註云綆三分寸之二輻股鑿之數也䟽云鑿牙之時孔向外侵三分寸之二使輻股外箄故曰輻股鑿之數鑿即孔也股字恐是骹字凡為輪行澤者欲杼行山者欲侔杼以行澤則是刀以割塗也是故塗不附侔以行山則是搏以行石也是故輪雖敝不甐於鑿注云杼是削薄其踐地者言牙輪之外中間踐地處削去少許而兩邊稍稜則泥塗不附著如刀割去之也侔注云上下等也謂牙輪之外無上下皆一同侔同也同則平如手摶石雖乆敝之後其孔鑿之内皆不摇動也不平則行久其鑿處必動甐動摇意也凡揉牙外不亷而内不挫旁不腫謂之用火之善亷有芒刺起處也挫摺折處也腫暴起擁腫處也為牙之木用火揉熨内外與兩旁皆平正無病方為精好是故規之以眡其圜也萭之以眡其匡也縣之以眡其輻之直也水之以眡其平沈之均也量其藪以黍以眡其同也權之以眡其輕重之侔也故可規可萭可水可縣可量可權也謂之國工此數行結輪人一章其文最妙先取輪之圓既圓矣又於圓中取其方萭音矩義亦同匡無邪枉也正也輻分四圍縣而視之上下皆直是上與下輻皆相直也置輪全體於水中則知其無輕重為平均也牙轂之藪皆以黍量則知其穿孔皆無小大深淺也以兩輪互秤之則知其輕重相侔也國工者一國所獨推也猶今曰國手也六箇可字結一句尤妙車上雜名尺寸下車人别論大車牛車也尺寸又與此别輪兵車輪崇六尺六寸乘車同田車減二寸軹乘車軹崇三尺三寸軫與轐共崇七寸軫圍尺一寸牙圍尺一寸轂長三尺二寸徑一尺三分寸之二藪徑三寸九分寸之五深三寸十八分寸之一分賢大穿徑六寸五分寸之二除金内實得徑四寸五分寸之二軹小穿徑四寸十五分寸之四除金内實得徑二寸十五分寸之四圍三寸二十七分寸之七大小穿謂金也金厚一寸軹名有三轂末為軹小穿為軹車箱上木為軹綆三分寸之二輻廣三寸半輪人為蓋輪人為輪今又為蓋者以蓋亦圓體故亦為之車上有蓋即蓋軫象天地者也達常圍三寸達常者蓋斗柄也乃近於蓋斗處圍三寸則其闊徑一寸桯圍倍之六寸信其桯圍以為部廣部廣六寸部長二尺桯長倍之四尺者二桯音盈蓋之杠也讀如丹桓宫楹之楹達常之長二尺濶一寸下入於桯中桯圍倍逹常之三寸則為六寸然後能上承達常也信其桯圍則統其桯圍而言之有六寸以為部廣部者蓋斗也即今之繖頭是也部之廣有六寸部長二尺則連達常而言之乃有二尺之長桯之長則倍逹常之四尺者二共有八尺兼達常二尺則有一丈此下文所謂蓋崇十尺者此也十分寸之一謂之枚十分寸之一者以一寸為十分而一分為一枚枚者枚數之也後世使枚字皆本於此部尊一枚部者蓋斗也上髙一分也弓鑿廣四枚鑿上二枚鑿下四枚鑿深二寸有半弓傘骨也傘骨入鑿處廣四分鑿上有二分鑿下有四分兼鑿處四分則為一寸則部正厚一寸也鑿深二寸有半者欲其入深則牢固也下直二枚鑿端一枚鄭云下直二枚者鑿孔下正而上低二分也直止也此處注䟽皆未明以意推之上言弓鑿廣四枚鑿上二枚鑿下四枚者謂鑿孔濶四枚其上二枚而下四枚是鑿孔上小而下大也不知古人之蓋縁何不曾說蓋下短竹處切疑古人車蓋不曾合只張之車上無開合也乘車既設旌旗無蓋此特潦車遇雨則用想乘車纔出潦車即隨故潦車載蓑笠以為雨之備也上文言廣此言深其孔内深處比孔又差小故曰下直二枚前言下直四枚此只二枚直者只之意也鑿端一枚則孔之内深處亦減一半故前鑿上二枚此曰鑿端一枚也前曰鑿上鑿下此又變文先曰下直二枚後曰鑿端一枚鑿端即鑿上但有孔内外之異耳弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫軹轂末出於輪外軫載人者比之輪又在内以六尺弓之長分此三句一件皆短一尺也輪比軹短一尺軫比輪短一尺參分弓長而揉其一弓傘骨也其勢稍彎是揉而成之也參分其股圍去一以為蚤圍股者弓之近部處也蚤與爪同弓之末也爪之大小比股圍三分減一分也參分弓長以其一為之尊尊髙也弓下稍平其上則彎處多方可以庇人下二分稍平上一分却髙此弓之勢也上欲尊而宇欲卑上尊而宇卑則吐水疾而霤逺尊是弓近部處宇是弓之彎處其庇人如屋宇吐水疾者言其勢斗則水去快而溜亦逺庶不濕軹與輪也霤屋霤也因上宇字故用霤字文法也蓋已崇則難為門也蓋已庳是蔽目也是故蓋崇十尺蓋已髙十尺又在車上是緫為丈四矣門髙丈四亦已髙矣不可更髙則無許髙之門矣已卑則蔽目者言其宇也宇太低則人立處不見車前矣良蓋弗冒弗紘殷畝而馳不隊謂之國工冒者蒙以衣也紘者以線穿聯其弓也未紘未冒之時馳而不隊則弓之入鑿者固也殷畝者横馳於畝中也横畝必有髙下車馳其間自有隱處必􅑾杌摇動而此蓋之弓不隊則為良蓋可知非國手不能為也殷音隱今人脚下有不平亦曰隱人輿人爲車車者緫一車之事而言輪輿軫蓋皆車也既别以輪人故此曰輿人為車者并輪蓋而安頓之也輪崇車廣衡長參如一謂之參稱輪論崇卑車論廣狹衡論長短三者尺寸皆同則相稱也車廣者車箱四方故以廣狹言之衡乃輈頸之上横而扼馬者注云輪車衡三者皆六尺六寸故曰參如一參分車廣去一以為隧隧深也車横六尺六寸以其横三分之去其一則兵車之深只有四尺四寸也參分其隧一在前二在後以揉其式三分其深一分在前二分在後人立其中式必近前方可也式横在車箱前人所憑而為敬者也揉者揉其木使正直而為之也以其廣之半為之式崇式在較下其髙只得廣之半也注云兵車之式髙三尺三寸以其隧之半為之較崇較在車箱前面又髙於式者也式髙三尺三寸此又髙於式二尺二寸故注云兵車自較而下五尺五寸也六分其廣以一為之軫圍六分車之廣而軫之圍只有其一則軫圍得一尺一寸也參分軫圍去一以為式圍參分式圍去一以為較圍參分較圍去一以為軹圍參分軹圍去一以為轛圍式又小於軫較又小於式軹又小於較轛又小於軹也車之前有式其兩相立木則式置其上立者為轛横者為軹此非轂末之軹也轛乃較之上頭也圜者中規方者中矩立者中縣衡者中水直者如生焉繼者如附焉此數句發明其制作之妙如生如附二句尤佳言其似非人所為也莊子曰附贅縣疣附亦生而有也凡居材大與小無并大倚小則摧引之則絶大小欲得其所故曰居大與大并小與小并則居之得所大與小并小與大并則居之不得所矣以大而倚小則必有摧折之慮以小而倚大則牽引而動小者力不任必絶斷也摧絶亦同但如此作文耳棧車欲弇飾車欲侈棧車不用皮束恐易損則宜弇者斂束不侈大也飾車則有結束雖侈不害車箱横闊闊六尺六寸較式上横木兩輢立木上出式者也吕和叔解淇奥詩猗重較兮曰古者車箱長四尺四寸以三分之前一後二横一木下去車牀三尺三寸謂之式又於式上二尺二寸横一木謂之較去車牀凡五尺五寸古人立乗平常則憑較若應為敬則落手憑下式而頭得俯詩補傳云較出於式故曰重較較崇者自式之上言之式崇者自車牀之上言之較與式相重通計之則共長五尺五寸式得三尺三寸較得二尺二寸較圍四寸九分寸之八式人所憑依者髙三尺三寸圍七寸三分寸之一輢車箱也音倚猶欄干也在兩旁軹輢之横者其旁止於此故曰軹音只轛式旁之直者對人而言故曰轛音對輿横廣六尺六寸圍二寸八十一分寸之十四亦曰邸輈長一丈四尺四寸衡長六尺六寸輈弧深四尺七寸在式前有十尺身在隧下則有四尺四寸身共長一丈四尺四寸當兔圍尺四寸五分寸之二頸圍九寸十五分寸之九踵圍七寸七十五分寸之五十一任正圍一尺四寸五分寸之二衡任圍一尺三寸五分寸之一軸圍一尺三寸五分寸之一軫間即輿之横廣是也伏兔至軓經無明文鄭云如式深也輈人為輈輈有三度軸有三理輈乃車之轅牽一車之重而接於衡以軛服馬者也輈人為輈今則并軸而論之者蓋車之軸所以穿兩輪者其上則乗載一車之重其軸若折則車必覆矣其選材與輈同皆欲其精當也故以一人主之度者數也長短有三等故曰三度輈曰度軸曰理理者物理之理也選材之道也國馬之輈深四尺有七寸國馬天子之乗馬也輈則車轅也揉曲而為之其轅曲中深四尺有七寸矣葢乗馬之軹崇三尺三寸加軫與伏兔於其上則為四尺兼輈之深則為八尺七寸矣國馬髙八尺而其餘七寸則於衡頸之間也田馬之輈深四尺田車軹崇三尺一寸加軫與轐五寸半則為三尺七寸矣兼輈之深四尺則有七尺七寸田馬髙七尺而餘七寸亦為衡頸之間也駑馬之輈深三尺有三寸駑馬之車軹崇三尺加軫與轐則為三尺四寸兼輈之深三尺三寸則六尺七寸矣駑馬髙六尺而其餘七寸亦為衡頸之間也此所謂三度也軸有三理一者以為媺也二者以為久也三者以為利也一車之中而軸為受重焉須當擇木而為之一者以為媺也欲其無節目然後不折二者以木之堅則可以久而不壊也三者欲其滑利而轉輪之速也軓前十尺而䇿半之軓在式前自式以前至於輈末其長十尺而御者之䇿在於十尺之間也軓前長十尺而輈之深不與焉若并輈之深則凡一丈四尺矣軓鄭𤣥云合作􅓶音犯車前法度也凡任木如任正衡任之類以木任物也任正者十分其輈之長以其一為之圍輿下三面之木也輿有四面後一面是輿之軫其三面皆有欄干欄干之下有材以任其上車所取正者故謂之任正十分其輈之長者輈長一丈四尺四寸以十分之得一尺四寸五分寸之二以為任正之圍也輈之軓前十尺與隧四尺四寸故以輈長一丈四尺四寸註鄭曰輿下三面材而疏以為木下及兩旁見面其上面著輿板不見故云三面此説未當艾軒謂今人不識車雖所説皆紙上語但以文理明之亦可决其當與否也衡任者五分其長以其一為之圍小於度謂之無任衡在兩軛之間軛馬之領正輈頸用力之處輈與衡相凑帶者若得其任則可以扼馬而引車也五分其長則是一分有二尺八寸者衡長六尺六寸以五分之得一尺三寸五分寸之一以為衡任之圍此若小於制度則木不勝任矣五分其軫間以其一為之軸圍十分其輈之長以其一為之當兔之圍參分其兔圍去一以為頸圍五分其頸圍去一以為踵圍軸謂車軸之貫轂者也輿廣六尺有六寸即軫之間五分取一以為軸圍則其圍一尺三寸五分寸之一與衡任者相應矣當兔即伏兔也謂輿下之貫軸者也輈長丈四尺有四寸十分取一為當兔之圍則其圍尺四寸五分寸之二與任正者相應矣頸謂輈前之持衡者也參分兔圍去一以為頸圍則其圍九寸十五分寸之九矣踵謂輿後之承軫者也五分其頸圍去一以為踵圍則其圍七寸七十五分寸之五十一矣凡揉輈欲其孫而無弧深軸用直木故只言三理而已輈是揉曲為之故須詳説孫者順也其揉曲之勢孫順自然若如弧弓而深則太彎矣今夫大車之轅摯其登又難既克其登其覆車也必易此無故唯轅直且無橈也是故大車平地既節軒摯之任及其登阤不伏其轅必縊其牛此無故唯轅直且無橈也轅即輈也在牛車則名轅此輈人論輈而言轅者以乗車田車之輈與大車之轅其法皆同也摯下也其𫝑直而不撓曲下至於馬則難登陁雖馬有力可以負而登亦必易覆故於平地之間雖其任髙下得節而不可施之登阤言平地髙下易凖節登阤則難節也軒髙也摯下也今人用軒輊字本於此伏其轅者牛伏其轅下為所遏也縊其牛者轅直而牛不勝如縊縛之也皆其勢不孫曲使然也故登阤者倍任者也猶能以登及其下阤也不援其邸必緧其牛後此無故唯轅直且無橈也登髙而轅直牛之負力倍於平地言用力多也此有力之牛猶可登也及其𫝑趍下則非援其車之邸必緧絆其牛之後二者皆能覆車也邸輿也皆四方之名援手引之也執住之意也緧者轡絡之類有此名也是故輈欲頎典前言轅此言輈明轅即輈也頎典注云堅紉之貎此古語也難以强通大抵欲其孫順得𫝑而不直之意輈深則折淺則負深太彎也太彎則易折淺太直也太直則馬如負然輈注則利凖利凖則久和則安其𫝑注水則便利也凖節也深淺得節則耐久也和與衡軛諸木和合則車不摇兀而安也凖或作水司農以為注則利水利水則久鄭𤣥不從以利凖二字不當重讀此説似得之葢𫝊冩之誤剩利凖二字也輈欲弧而無折經而無絶進則與馬謀退則與人謀終日馳騁左不楗行數千里馬不契需弧深則易折弧不深則固經理也順理則無斷絶之慮進而從馬退而從人故曰與謀左不楗者尊者居左車既安則尊者安不拘束也楗有拘束之意契需古語也亦難强解行千里而安則馬亦不費力其意大扺如此若以契為鍥薄之意曰不傷蹄需為濡遲曰不留滯皆是牽强如莊子之謑髁輐斷如詩之靡盬鞅掌殿屎等字亦如何强解得古今語不同豈可强索於數千載之後如今郷談隨方各有使古人聞之亦豈易曉耶終嵗御衣衽不敝此唯輈之和也御者費力則衣衽必損弊若皆順溜則御者不費力矣此數句皆形容輈之和而已勸登馬力馬力既竭輈猶能一取焉輈和則馬省力如助之也勸助也一取者一進也馬力既竭猶能一進𫝑順易行也良輈環灂自伏兔不至軓七寸軓中有灂謂之國輈灂漆也囬環皆漆所不漆者自伏兔至軓七寸而已其軓中亦有漆處此下似有脱文不應以此一節而稱其為國輈也軫之方也以象地也葢之圜也以象天也輪輻三十以象日月也葢弓二十有八以象星也艾軒云車之初作未有此説既成之後以此比象此説極當輿體四方可以象地不言輿而言軫者軫在輿後見輿先見軫也若輿前則有輈隔之矣葢輪俱圓皆可象天不言輪而言葢者葢在人之上輪倚車之傍必捨傍而言上可也輻數三十以象一月之日數也晦朔相推而後成月故併日言之葢弓二十八以象二十八宿東西南北之星也宿亦曰舍亦曰辰總而言之則皆星也龍旂九斿以象大火也鳥旟七斿以象鶉火也熊旗六斿以象伐也龜蛇四斿以象營室也斿幅也九斿七斿六斿四斿皆隨諸侯命數若天子之數則十有二矣此言天子之車而有九七六四者賈氏疏云上得以兼下是也艾軒云王者之行必有四方之旗隨其所指麾而用之此説極當易山齋云曲禮行前朱雀而後𤣥武左青龍而右白虎即此四旗是也此證極是鄭氏曰象大火者以九斿象尾之九星也象鶉火者以七斿象星之七星也象伐者以六斿象伐連參為六星也象營室者以四斿象室與璧為四星也然大火在房心何與於尾尾為析木矣鶉火在柳星張何獨言星乎伐不連參則三星而已室不連璧則二星而已就其説而强通之獨有鶉火舉其中為可解其他未免牽强艾軒謂不必論斿數但蒼龍東方之旗也則畫東方大火朱鳥南方之旗也則畫南方鶉火熊虎類也熊為西方之旗則畫西方伐星龜蛇北方之旗也則畫北方營室此説甚簡徑近理且合曲禮無可疑者旂旟皆旗也三者通名無他義巾車春官也所建之旗太常而下有大旂大赤大白大麾或以大旂為龍旂大赤為鳥旟大白為熊旗大麾為龜蛇亦可牽合但大赤大白雖合於朱雀白虎之名大旂則已難通矣况大麾乎大抵周禮出於戰國本非成周之制六國隂謀之説似得其原考工非冬官本書縱可牽合亦未足憑况勉强勾引而為之説乎艾軒云此皆無益而枉用心者弧旌枉矢以象弧也鄭云弧以張縿之幅凡旗必有弧故曰弧旌凡旗皆畫矢取其威也枉矢者大流星之名也疏引考異郵曰枉矢狀如流星蛇行有毛目此妖星也因其畫矢借枉矢以名之作記之文也張縿以弧畫以枉矢取象天之弧星也古之龍旂畫東方大火之星鳥旟畫南方鶉火之星熊旟畫西方參伐之星龜蛇畫北方營室之星今三禮圖中如此畫實非古制鄭誤之也攻金之工築氏執下齊冶氏執上齊鳬氏為聲㮚氏為量段氏為鎛器桃氏為刃此數行乃攻金諸官之總序也多錫為下齊少錫為上齊大刃削殺矢鑒燧用下齊鐘鼎斧斤戈㦸用上齊鳬氏為鐘此言聲桃氏為劒此言刃鐘主於聲劒主於刃亦變文爾金有六齊六分其金而錫居一謂之鐘鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈㦸之齊參分其金而錫居一謂之大刃之齊五分其金而錫居二謂之削殺矢之齊金錫半謂之鑒燧之齊此亦總序之文鄭云凡金多錫則刃白且明故諸齊皆以錫和之但此文有鼎有斧斤鑒燧而經無此官疑有缺失恐冶氏桃氏所職亦不止一項以此推之考工記之所失者多矣築氏為削長尺博寸合六而成規欲新而無窮敝盡而無惡削書刀也古人用竹簡先以火灼後以削刀刻而為書漢人猶曰刀筆吏孔安國所寫尚書猶用竹簡是古制猶在也然古人有刀亦必有筆故子張有書諸紳之語紳非刀可刻也自漢人造紙不用絹帛為書一向趨於簡便故殺青汗簡之事頓廢遂不復有此書刀之名矣長一尺而闊一寸以六刀相合可以成規則其刀之勢必彎曲鄭康成亦曰若弓之反張可合九合七合五而成規也馬融諸家以為偃曲却刄則書刀之刃在上矣今無此制難以强通欲新而無窮者其刃可磨而發無窮已也如今髪刀愈削愈芒雖敝盡而無惡也純鋼為之磨削至盡其刃亦芒無瑕惡也似此等句可看古人文字下語處冶氏為殺矢刃長寸圍寸鋌十之重三垸鄭氏云為殺矢以下至重三垸凡十四字脱誤在此葢以殺矢在下齊戈㦸在上齊前言冶氏執上齊不應乃為殺矢此説是也矢人造八矢殺矢已在内明此為脱誤重出也殺矢田獵所用也長一寸圍亦一寸鋌箭足也其入笴處曰鋌重三垸者秤之則重三垸也戈廣二寸内倍之胡三之援四之戈二刃刺兵也鄭氏以為句兵者言其形句曲也戈之制有三名其曰廣二寸者戈之通身必徑二寸也内者胡以下接柄者也其長四寸胡者旁出之一鋒也其長六寸援者刃之直而向上者也其長八寸漢時謂此戈為雞鳴者以其胡之句勢似雞鳴也又謂之擁頸者亦以其胡曲而名之也康成又曰句孑㦸者當時之名也戈㦸異制戈二刃㦸三刃而鄭以㦸證之者漢時不分戈㦸為二也凡兵之器直而無胡者則矛也有胡者則二鋒三鋒通為戈㦸也已倨則不入已句則不决已倨太直也已句太曲也倨句皆論胡之勢也長内則折前短内則不疾胡之下曰内戈鐏處也太長則胡以上之援與胡句相並如磬之折則不可以刺也前即上也胡之上亦曰前故謂之折前言其前磬折不可用也内若太短則胡以上之援必過長過長則胡縮而援出多下重上輕則用之不快便也故曰不疾是故倨句外博倨言胡之上句言胡之下其曰外博者以直刃之援視旁出之胡則援為内而胡為外胡之刃必博於援之刃故曰外博著是故二字而並倨句言之者謂胡之制必博而要倨句皆宜也戈之通身皆徑二寸而胡又加博者援以下稍圓厚而胡則褊薄也重三鋝鋝音劣或音丸與吕刑之鍰同鍰音丸又音援是六兩也㦸廣寸有半寸内三之胡四之援五之㦸與戈同戈二刃而㦸三刃故鄭氏曰今三鋒㦸也其鐵身廣一寸有半其内長四寸半胡四之則六寸援五之則七寸半倨句中矩此并兩旁之胡言之句倨得所則其勢稍方故曰中矩與刺重三鋝以兩胡與直刺之刃秤之皆重三鋝也刺即援也皆為直刃之名戈二刃㦸三刃疑有輕重而皆三鋝者㦸必稍狹於戈亦必稍薄於戈也戈廣二寸今句孑㦸或謂雞鳴或謂擁頸戈之所用主於胡戈二刃内胡以下接柲者胡下柄入處曰内内長則援短短則胡頭低故曲於磬折内短則援長長則胡頭舒故倨於磬折此胡之取則於磬折也援直刃也最上刺刃也直而向上者胡孑也胡似雞鳴以胡曲故曰擁頸矛之旁出者句倨句為太曲倨為太直倨謂胡上句謂胡下倨之外胡之裏謂胡下近本處増使廣句之外胡之表謂之胡上近本處増使廣胡本上下俱寛此兩行乃疏解注中説外博處但上下俱寛四字似拘於磬折而欲其方故有此解今所解似稍平直不必如此費分疏也㦸三鋒㦸也内胡援刺凡四名凡㦸而無刃秦晉間謂之孑或謂之鑣呉揚之間曰伐東齊秦晉間大者曰曼胡其曲者曰句孑曼胡胡㦸胡横貫之横三寸直下三寸胡中矩則句倨不中矩刺著柄直前如鐏者也在援胡之横上中使出者司農曰刺即援與鄭氏如鐏二説雖殊皆為直刃援則近上刺則近下不出一刃之上所爭者亦微矣若以為刺即援其説亦簡徑桃氏為劒臘廣二寸有半寸兩從半之劒面通廣二寸半其兩從中分各一半也從自脊中而分兩邊也以其臘廣為之莖圍長倍之莖劒夾中人所把處其圍五寸長一尺也中其莖設其後以一尺莖之中分之下一半稍大也後者下一半也參分其臘廣去一以為首廣而圍之首劒把接刃處其圍得一寸三分寸之二也首不圓故曰廣而圍之身長五其莖長重九鋝謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之身者去劒柄而言也莖長一尺上制之劒長五尺中制長四尺下制長三尺也上中下士者以其人才之短長言之非命士也隨人才之宜而用其長短要人與器相得也鋝六兩也九鋝五十四兩也臘通劒面之名從自脊而分兩面為兩從蓋中髙兩旁殺以趨於鍔也莖劒夾中人所握處鐔以上也後莖中以下稍大則易把握也首劒把接刃處也鳬氏為鍾艾軒曰博古圖起於宣和間漢晉時無有也由歴代以來掘得古噐於宣和間始為圖載之以示後世漢晉諸儒不曾見此無怪乎其不知也是以聶崇義所作三禮圖全無來歴榖璧即畫榖蒲璧即畫蒲皆以意為之也不知榖璧只如今腰帶夸上粟文觀博古圖可見使當時掘得古噐藏之上方不載之圖今人何縁知之此圖至金人侵軼後皆無此本及吳少董使北見之遂市以歸尚有十數面不全兩欒謂之銑銑間謂之于于上謂之鼔鼔上謂之鉦鉦上謂之舞欒角也鍾體不圓故有兩角名欒又名銑二名即一物也銑音姑洗之洗兩角之間名之曰于者鍾脣之上也于上謂之鼔者可擊之處也聲所自出也鼔上謂之鉦者鍾腰之上也鉦上謂之舞者鍾之頂也于鼓鉦舞凡有四名皆在鍾之體舞上謂之甬甬上謂之衡甬鍾柄也衡乃甬上平處鍾縣謂之旋旋蟲謂之幹旋者鍾柄上有孔也繫之可以旋轉也旋蟲謂之幹者旋之四環為蹲熊盤龍辟邪之類也名之曰幹以其為獸形故曰蟲鍾帶謂之間謂之枚枚謂之景鍾有四帶上畔一帶下畔一帶中二帶者帶之紋也間有乳鍾有兩面每面三十六乳作四簇一簇九乳乳曰枚可枚數也亦曰景注云如日景之明此因字生義也于舞之類亦可以義解乎于上之攠謂之隧攠受擊處也攠者摩而靡弊也隧者其攠之中稍窪而深如陽燧之形也故注云窪而生光自此以上鍾體之名備矣十分其銑去二以為鉦以其鉦為之銑間鍾體下大而上斂故鉦小於銑十分之二也銑間去兩角之有紋處則與鉦同也是兩角有紋處各得十分之一也去二分以為之鼓間以其鼔間為之舞脩去二分以為舞廣去銑間二分則鼓間只得十分之六也舞脩者以横言也與鼔間同舞廣以縱言也只得十分之四也以其鉦之長為之甬長甬鍾柄也其柄之長如其體之鉦以其甬長為之圍參分其圍去一以為衡圍長如其圍若甬長一尺則其徑三寸三分以上矣衡小於甬故只得其圍之二參分其甬長二在上一在下以設其旋旋不在甬之中旋之上則長而下短者以為固也凡此長短小大不言尺寸者隨鍾之小大而為之加减也薄厚之所震動清濁之所由出侈弇之所由興有説凡鍾之擊厚亦震動薄亦震動因其侈弇而聲有清濁故先總提起三句而以有説二字結之自鍾已厚以下乃其説也注音説為稅猶意也恐亦不必如此只是解説之説也鍾已厚則石已薄則播石聲不發也失之太厚則其聲不發播散也失之太薄則其聲散侈則柞弇則鬱柞音窄其聲咋咋然亦散之類也鬰亦不發之類長甬則震甬太長則懸之摇兀不安也震摇也是故大鍾十分其鼔間以其一為之厚小鍾十分其鉦間以其一為之厚隨鍾之大小量其鼔間鉦間之尺寸以為其體之厚薄也鍾大而短則其聲疾而短聞鍾小而長則其聲舒而逺聞疾者淺而踈急則易竭不久故曰短聞舒緩也逺久也以此而觀則鍾之體宜小而長不宜大而短也為遂六分其厚以其一為之深而圜之遂即隧也受擊之處其體必浮而起比其厚得六分之一是隧之深處合如此也圜者隧之形必圓也不曰六分其隧之厚而曰為遂六分其厚者此變文也古人如此作文皆其用意變換處銑徑十分徑脩也注云横為脩從為廣凡言間者亦為從鉦徑得八分銑間與鉦之徑同亦八分間從也廣為從銑外有二間鉦外惟一間鼓間得銑徑六分間從也舞徑與鼓間同徑横也舞間得銑徑四分間廣也從也鼓六鉦六舞四比鍾口十其長十六舞間四方四也鼓間六亦方六也經不言鉦間亦六也十分以十分分之看鍾口徑多少皆作十分分鍾有小大則口徑有多少不同經云鍾之四等尺寸銑之從横舞之從横皆具言之唯鉦言横八而不言從鼓言從六而不言横或者互見也一處皆鍾之中腰想無隆殺故互言之二者既無異而為别名者以有篆鍾帶曰篆介其間也但下言大鍾小鍾之厚尺寸而分别言鼓間鉦間又似其從不同六也注以經云間非也以為當言鼓外鉦外注説鼓間鉦間曰篆以介之鉦間亦當六則鍾帶在鉦鼓之間也㮚氏為量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之改煎者煎之又煎如今煉熟也煎至無耗折然後可秤既秤之已得實斤兩不折矣然後凖其髙下厚薄合用多少銅料入鑄也凖其髙下厚薄以鑄則知其既成可以量得多少升斗也凡官名不可强說易山齋以桃辟不祥遂為劒㮚堅也遂為量皆强生意義鍾之染羽鳬之為鍾如何可解量之以為鬴深尺量其實有六斗四升則可以為鬴也深尺者鬴深一尺也周人以八寸為尺謂之尺者八寸也説文曰咫八寸周尺也王制曰古者以周尺八尺為歩今以周六尺四寸為歩此周尺漢尺不同與周尺止八寸之明證也内方尺而圜其外其實一鬴鬴内四方每方各一尺而其外則為圓形也左氏曰晏子云各自其四以登于釡是四龠為合四合為升四升為豆四豆為區四區為鬴釡即鬴也語曰與之釡亦此鬴其臋一寸其實一豆其耳三寸其實一升臋者底也覆量之其底深一寸可以容一豆之米也其耳在旁可以手舉者覆之可受一升其深有三寸只言深不言大小即所受則可凖也重一鈞漢鬴亦深尺内方尺而圓外乃重二鈞者漢用黍尺十寸周尺八寸也其聲中黄鍾之宫黄鍾律九寸而受千二百秬黍以為龠是五量之法皆本於黄鍾之律自龠而上四加至鬴則其聲亦中黄鍾矣黄鍾宫聲也故曰黄鍾之宫古者神瞽考中聲以制量中聲即宫聲也槩而不稅槩平也法也㮚氏鑄此以為天下之法使天下之為鬴者皆取平於此而賦入租税之時實不用之此句注疏皆未通諸家亦强説以為官司為之聽民自用不收其稅也此説殊無義理葢此鬴既一鈞一鈞三十斤也其噐已重三十斤又量六斗四升之米則其重又甚矣若終日用之其人不亦疲也竊意古人自有木制之噐特鑄此以為之式故其銘曰茲噐維則也若欲官司鑄之而借百姓之用當有畿鬴邪古人既能以木為鼓穹曰臯陶矣豈不能為木鬴乎其銘曰時文思索允臻其極嘉量既成以觀四國永啓厥後茲噐維則時文者古之賢王也猶詩曰思文后稷也時思皆起語也古有文徳之君思索之深信至其極能為此嘉量也允信也臻至也嘉贊美之也觀者示也以此觀示四國開啓後來之人皆以取則於此則法也舜方即位即同律度量衡古者天下分國之多恐其大小不一或以病民故以此為大節目今文思院降樣亦此意也凡鑄金之狀金與錫黑濁之氣竭黄白次之黄白之氣竭青白次之青白之氣竭青氣次之然後可鑄也此總言鑄金之法以火候之也初鑄之時火色黑濁者其中穢雜尚多也􅨗去穢雜火色又變而黄白亦未净潔也􅨗鎔既久變而青白稍净而未盡白色去盡火色純青則金錫熔煉至此十分精矣方可入鑄也段氏闕段音鍛必鑄金之工既已缺矣不可强説函人為甲艾軒曰孟子云矢人惟恐不傷人函人惟恐傷人工匠之人各以其技豈必有心孟子所謂仁不仁借以明擇術之必謹也古者百工之事各命官以主之為甲則有函人之官又有鮑人之官所謂官師相規工執藝事以諫皆此等人也大抵古者制作噐物皆是通明識義理之人今博古圖所載其他皆不可得見惟古鍾埋没土中不能壊圖尚有之看此一鍾大段精至豈是俗人做得葢粗而噐物自有道徳性命之理不離乎日用之間且誰非畫工五代則有一郭忠恕近代則有李伯時所謂百工技噐皆如此人為之宜其不俗也犀甲七屬兕甲六屬合甲五屬犀甲夀百年兕甲夀二百年合甲夀三百年屬音注七屬者甲之札葉七節相續也一葉為一札有七節六節五節相續者犀即牛也取犀之名美也夀百年可用之百年不壊也兕甲者以虎皮為之也合甲者削牛皮裏而留其刃者兩片相合為之也其耐久可三百年凡為甲必先為容然後制革容者相其人之身大小長短而為之也先觀人身然後制革權其上旅與其下旅而重若一以其長為之圍上旅腰以上也下旅腰以下也重若一者上下等也長與圍等者欲其相稱也春秋有所謂甲裳者上曰衣下曰裳下旅即甲裳也凡甲鍛不摯則不堅已敝則橈鍛煉皮也煉皮不至於熟則不堅刃也已敝者煉太熟也太熟則橈曲軟弱也摯至也凡察革之道眡其鑽空欲其惌也眡其裏欲其易也眡其朕欲其直也櫜之欲其約也舉而眡之欲其豐也衣之欲其無齘也眡其鑽空而惌則革堅也眡其裏而易則材更也眡其朕而直則制善也櫜之而約則周也舉之而豐則明也衣之無齘則變也鑽空者鑽穿而為孔也惌者孔小貎也鑽孔小則堅而難壊也故曰革堅也裏者皮内面也易如易其田疇之易皮裏治去得净潔更變其材本質無始者之穢惡也故曰材更也皮近肉處則多穢去之必盡也朕縫去聲處也縫路皆直則制作之善也故曰制善也櫜藏也卷而藏之約束易𦂳則是制作密緻而周也舉舉起也豐大也卷時小舉起時大其札葉相續處皆分明可觀也故曰則明也衣者著之於身也齘齵齧不齊也衣之而無齵齧不齊處則於人便利也變便也故曰則變也此皆古人作文處不可不子細看鮑人之事此一句下經之總目也不曰鮑人為某而曰之事其所治之皮不主一用也望而眡之欲其荼白也逺望而視之望主嚮言眡主目言皮如荼菜之白則既煉之皮已盡美也進而握之欲其柔而滑也近前取而把握之若已柔滑則為善也卷而摶之欲其無迆也摶捲束之義也只作搏字亦可通今只得從注讀無迆者無斜迆處言其柔軟平正而無緩急處也眡其著欲其淺也著者幔著於物之上不見其厚但見其薄即幬而廉之意淺即薄也察其線欲其藏也皮作北人謂之雙線工藏者縫之而不露線也革欲其荼白而疾澣之則堅此下又重解前句亦與函人一段文勢同疾澣者不可久漬之於水則易壊也欲其柔滑而腛脂之則需其所以柔滑者脂腛之而濡弱也煉皮必用脂也腛與渥同音義引而信之欲其直也信之而直則取材正也卷之無迆伸之則直言平正也信之而枉則是一方緩一方急也若苟一方緩一方急則及其用之也必自其急者先裂若苟自急者先裂則是以博為帴也枉斜也伸之而斜則是不平正必有一處緩一處急纔有緩急不調處則以之而用急處必先裂苟有裂處則皮雖博闊乃成淺狹之材葢裂處則不中用也帴與淺同音義或音翦亦淺之義引信數句詳解進握一句也卷而摶之而不迆則厚薄序也不迆無他只是皮之厚薄得其序言厚薄停均也眡其著而淺則革信也著於物而淺只是革伸得盡言綳得緊也亦皮之平正可以幔綳也察其線而藏則雖弊不甐弊者舊也不甐者線不傷重也韗人為臯陶臯陶鼔木也幔鼔皮一人為鼔穹又一人臯有髙義陶有陶穴之狀也長六尺有六寸左右端廣六寸中尺厚三寸穹者三之一臯陶長六尺有六寸有與又同義此臯陶非渾成之木乃合版為之其版片之端自左至右廣六寸其版之中廣一尺而版之厚則三寸以二十片版合之為臯陶兩頭差斂中間却髙故曰穹者三之一言三分其鼔木穹處有一分也注言二十版者以下文鼔面四尺推之版端廣六寸二十版共長一丈二尺圍圍三徑一故鼓面四尺濶也上三正三正者兩頭與中央皆欲其端正也如今人為桶直則易二頭斂中央穹則難得端正鼓之上三者俱正則工之善者也上者一鼔之上也鼓長八尺鼔四尺中圍加三之一謂之鼖鼔前言三正與六尺六寸者不言鼓名必鼔之大者賈侍中以為晉鼓亦意之也此言鼖鼓之制長八尺者鼓木也又曰鼓四尺革所鞔之鼔面也中圍加三之一者鼓木之穹處也以四尺而加三之一則圍為丈六矣為臯鼓長尋有四尺鼔四尺倨句磬折臯鼓長尋有四尺則其長一丈二尺恐太長此據經如此説鼔面與鼖鼔同而其長加四尺今未見此制臯鼔既為役事之用毋乃不便利乎倨句磬折與冶人所解義同但鼔為圓物何縁有倨句磬折之形也或恐脱文在此注疏皆依文解義只得且依之謂鼔之圍亦有倨直句曲磬折之處皆要得宜也凡冒鼓必以啓蟄之日冒鞔也啓蟄雷乃發聲故用此日艾軒謂隂陽拘忌自古如此非特今人以聲取聲又今人取吉利響卜之義良鼓瑕如積環瑕者痕也積環者累積其環圓之物也鼔皮既漆其皮鞔急則文理累累如環之積此無他只言鞔得𦂳急也鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞疾而短不如舒而逺其義與鍾同韋氏闕裘氏闕畫繢之事畫以分布五色也繢則㑹聚而已賈氏疏云畫繢並言者言畫是總語以其繢繡皆須畫也雜五色繪畫必雜用五采之色也東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之𤣥地謂之黄天地四方各主其色以設色之畫本乎天地四時亦猶車旗取象之義也天𤣥者蒼茫之所極自見其色幽𤣥非黒非赤故謂之𤣥青與白相次也赤與黒相次也𤣥與黄相次也青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻此又言五色之相比次序如此青與白東西相比也赤與黒南北相比也𤣥與黄天地相比也此是其相次者若青與赤謂之文赤與白謂之章白與黒謂之黼黑與青謂之黻又其不相次者也古人黼黻只是二色相次而名之論十二章者以黼為斧黻為兩已相背皆後人私意增加非古也五采備謂之繡書之十二章上言作繪下言絺繡衣則繪裳則繡亦是一體事所以畫與繡並言之畫工繡工雖異其用色則同也土以黄其象方天時變此三句最竒絶之文九字之中而天地四時五方之色俱盡畫地則以黄中央主土此中央之色其在四方則隨東西南北而象之若分天時之色則春夏秋冬隨時變春則青夏則赤秋則白冬則黑如月令所用車服及青陽左个之類皆隨時隨方而更變者也古文如此多少竒特艾軒云此造化間渾成之文非後世枝葉之比也火以圜山以章畫火則取其𦦨但為圜而旋上之文則知為火矣章即獐也不畫山即畫獐則知為山矣水以龍亦然水以龍鳥獸蛇此六字又竒甚水以龍本對山以獐而言龍水之象也因龍字在上又以鳥獸蛇字在下天文之前朱雀後𤣥武左青龍右白虎四方又可見矣東方只畫一龍則知東方之為青矣西方只畫一虎則知西方之為白矣南北方皆然獸虎也蛇龜𤣥武也如前言四旗之制又不用此法也雜四時五色之位以章之謂之巧首言雜五色此言雜四時者謂五色取象四時也言四時則五方又在其中矣此章字乃彰施之章也設色如此必有能者為之則謂之巧非曰雜色以章即為巧也如曰三材既聚巧者和之之意凡畫繢之事後素功素者畫時先為粉地也功與工字同先施素地之功而後可畫繪也夫子曰繪事後素即此意此圖所畫只據三禮圖如此古人之制未必然如鼎上所鏤獸類皆無全形者斧與亞字尤非古也鍾氏染羽易氏曰莫重於鍾莫輕於羽羽之色欲其重故以鍾人染羽其牽强可笑如此官名出於古人豈可强揣摩其在當時必有説今既失傳誰得而解之以朱湛丹秫三月而熾之湛漬也丹秫赤粟也以朱漬粟釀色以染色也三月者釀三月而後熟也熾炊也既釀而炊然後可用淳而漬之淳沃也沃其羽而浸漬之鄭云以炊下湯沃其羽而又浸漬之使其羽與色相入而後可染也三入為纁纁赤色也染赤色者三入三次而後上色也五入為緅緅鄭云今禮俗文作爵言如爵頭色也其色近於黒而非純黒者也染緅者必五入而後上色也七入為緇緇黑色也染黑者必七入而後上色也此染羽與染人染布帛不同况考工自是一書不可以周禮參論謂既有染人又有鍾氏其意如何如此則必有牽强之論筐人闕此官既缺所職不可知矣㡛氏湅絲此以生絲湅熟之也以涗水漚其絲七日去地尺暴之禮有涗齊謂泲酒為涗泲子禮反和滓用也鄭氏謂涗水者以灰泲水也漚漬也以灰水漬絲七日然後漉起縣而暴曬之去地尺者絲上帶水不宜縣髙也晝暴諸日夜宿諸井晝則見日夜則掘地為井以縣其上欲其水有所歸也葢既漬即縣不終夜在水中也七日七夜是謂水湅既漬又暴既暴又漬七日夜如此方可用也此為水湅之法湅帛以欄為灰絲未織者也帛織成者也以欄為灰而湅之渥淳其帛實諸澤噐淫之以蜃渥沃也淳亦沃也既以欄木灰水沃其帛矣乃安諸滑澤噐中又以蛤灰浸之淫者浸淫使滿噐羃其帛也淫鄭云薄粉之令帛白杜子春作湼蜃白湼黑恐皆未通清其灰而盝之而揮之而沃之而盝之渟之已久其灰既清灰沉而水浮也灰清而後漉起揮者擺洗之也沃之者既揮洗又再浸漬而後漉起也而塗之而宿之明日沃而盝之塗者又以藥物塗其上宿之一夜明日而後漉起也今人白練以猪膏未知古人所用何物晝暴諸日夜宿諸井七日七夜是謂水湅此與練絲同法言練絲帛皆晝暴夜宿七日而後已也此一段文與關尹子相類皆古文之妙者考工記解巻上考工記解卷上釋音序鏄博廬盧爍啇入聲枳只鸜一作鸛音權又音渠貉鶴妢焚笴槀泐勒摶團埴植㮚栗段煅鮑如字平聲一作鞄匹學反又音僕韗運筐匡㡛芒楖責旊倣又音甫軫真上聲迆移聲上柲秘殳殊酋在由反樸卜又音僕屬燭戚促庳婢阤駞又音他音齒軹只轐朴輪人幎覔迆移上聲揱蕭捎朔三音幬疇又音蹈綆音餅下同菑音孜下同蚤爪齵偶平聲又音隅藃耗乂音涸柞窄摰言入聲椁如字阞勒捎蕭藪叟數朔幬籌深去聲竑紘弱與菑同讀如字溓黏骹爻上聲又敲上槷言入聲杼貯侔牟又音茂甐吝又音鱗萭矩輪人為葢桯盈信伸廣去聲鑿音漕又如字深闖蚤爪霤溜庳婢紘宏殷隠輿人稱去聲廣去聲隧遂較角轛對軹只中去聲縣𤣥衡横并如字又於政反棧孱上聲弇掩輈人輈晝乎聲媺美孫去聲覆福縊衣又音意緧秋頎墾典殄準或作水誤也楗蹇契怯需如灂醮又在學反床入聲斿留攻金之工齊去聲下同量亮冶氏鋌挺垸丸句勾鋝劣刺去聲桃氏臘力合切乂獵鳬氏欒鸞銑先上聲鉦征甬勇縣𤣥旋如字攠靡又去聲弇掩說稅柞窄聞問㮚氏耗毫去聲量凉鬴甫中去聲量亮段氏段鍛函人函含屬注摯至空孔又如字惌宛易去聲朕直忍反櫜羔衣去聲齘戒更平聲鮑人鮑如字平聲或作鞄音朴荼徒卷捲摶直轉除面二反迆移丄聲著張入腛渥需軟信申帴翦又音淺甐吝又音鄰韗人韗運陶或為鞠徒刀切句勾聞問鍾氏湛漸染之漸秫述纁勲緅鄒又祖侯反㡛氏㡛芒湅練涗稅漚鷗去聲暴蓬入聲欄練又音蘭渥謳去聲淳諄淫鄭云淫薄粉之令帛白杜子春音涅盝鹿考工記解卷上釋音
